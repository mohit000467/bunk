<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bunk Planner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f8;--text2:#9090aa;--text3:#5a5a72;--accent:#7c6af7;--accent2:#a78bfa;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--green-bg:rgba(52,211,153,0.1);--yellow-bg:rgba(251,191,36,0.1);--red-bg:rgba(248,113,113,0.1);--radius:16px;--radius-sm:10px;--shadow-lg:0 20px 60px rgba(0,0,0,0.5)}
.light{--bg:#f0f0f8;--bg2:#e8e8f5;--bg3:#fff;--surface:rgba(0,0,0,0.03);--surface2:rgba(0,0,0,0.06);--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#111118;--text2:#555568;--text3:#aaaacc}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes bounceIn{0%{opacity:0;transform:scale(0.85)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.3}}
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
.glass{background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(12px);border-radius:var(--radius);transition:border-color .2s}
.glass:hover{border-color:var(--border2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .18s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(124,106,247,.35)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(124,106,247,.55);transform:translateY(-1px)}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-full{width:100%;padding:13px}
.input-wrap{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.05em;text-transform:uppercase}
.input{width:100%;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;transition:border-color .2s,box-shadow .2s;outline:none}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,247,.15)}
.input::placeholder{color:var(--text3)}
.input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(248,113,113,.12)}
.input-hint{font-size:11px;color:var(--red);margin-top:2px}
.input-group{position:relative}.input-group .input{padding-right:44px}
.input-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--text3)}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.light .nav{background:rgba(240,240,248,.9)}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}.nav-logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-user{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text2)}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.theme-toggle{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);transform:rotate(20deg)}
.main{max-width:1100px;margin:0 auto;padding:32px 24px}
@media(max-width:600px){.main{padding:20px 16px}}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 20% 50%,rgba(124,106,247,.1) 0%,transparent 60%)}
.auth-card{width:100%;max-width:420px;padding:40px 36px;animation:bounceIn .4s ease}
@media(max-width:480px){.auth-card{padding:26px 20px}}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{font-size:52px;display:block;margin-bottom:10px;animation:float 3s ease infinite}
.auth-logo-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}.auth-logo-title span{color:var(--accent)}
.auth-logo-sub{font-size:13px;color:var(--text2);margin-top:5px}
.auth-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--bg3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.auth-stack{display:flex;flex-direction:column;gap:15px}
.hero{text-align:center;padding:40px 0 32px;animation:fadeUp .5s ease}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(124,106,247,.15),rgba(167,139,250,.1));border:1px solid rgba(124,106,247,.25);color:var(--accent2);font-size:12px;font-weight:600;padding:5px 14px;border-radius:100px;margin-bottom:16px}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:800;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,var(--text) 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:15px;color:var(--text2);max-width:460px;margin:0 auto;line-height:1.6}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px}
.tab-btn{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--bg3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tab-btn:hover:not(.active){color:var(--text)}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:700px){.calc-grid{grid-template-columns:1fr}}
.calc-card{padding:28px}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.inputs-stack{display:flex;flex-direction:column;gap:16px}
.circle-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
.result-box{padding:16px 18px;border-radius:var(--radius-sm);display:flex;align-items:flex-start;gap:12px;animation:bounceIn .4s ease}
.result-icon{font-size:26px;flex-shrink:0}
.result-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px}
.result-detail{font-size:13px;color:var(--text2);line-height:1.5}
.result-safe{background:var(--green-bg);border:1px solid rgba(52,211,153,.2);color:var(--green)}
.result-risk{background:var(--yellow-bg);border:1px solid rgba(251,191,36,.2);color:var(--yellow)}
.result-danger{background:var(--red-bg);border:1px solid rgba(248,113,113,.2);color:var(--red)}
.motivation{margin-top:14px;padding:13px 16px;background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(167,139,250,.05));border:1px solid rgba(124,106,247,.2);border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--accent2);text-align:center}
.mini-bar-wrap{display:flex;flex-direction:column;gap:5px;width:100%}
.mini-bar-header{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);font-weight:500}
.mini-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(0.34,1.56,0.64,1)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.04em}
.badge-safe{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.badge-risk{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
.badge-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.subjects-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.subject-card{padding:22px;position:relative;overflow:hidden}
.subject-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.subject-card.safe::before{background:linear-gradient(90deg,var(--green),transparent)}
.subject-card.risk::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.subject-card.danger::before{background:linear-gradient(90deg,var(--red),transparent)}
.subject-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.subject-actions{display:flex;gap:6px}
.subject-actions button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;color:var(--text2)}
.subject-actions button:hover{background:var(--surface2);color:var(--text)}
.subject-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.subject-stat{text-align:center;padding:8px;background:var(--surface);border-radius:8px}
.subject-stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.subject-stat-label{font-size:10px;color:var(--text2);margin-top:2px}
.stats-row{display:grid;gap:14px;margin-bottom:20px}
.stat-card{padding:16px;text-align:center;animation:fadeUp .5s ease both}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.add-form{padding:24px;animation:slideDown .3s ease}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.add-form-footer{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
.empty-state{text-align:center;padding:60px 24px}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.5}
.empty-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.trend-wrap{padding:24px;margin-bottom:24px}
.trend-bars{display:flex;align-items:flex-end;gap:8px;height:100px;margin-top:16px}
.trend-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.trend-bar{width:100%;border-radius:5px 5px 0 0;transition:height .8s cubic-bezier(0.34,1.56,0.64,1);min-height:4px}
.trend-bar:hover{filter:brightness(1.2)}
.trend-bar-pct{font-size:10px;color:var(--text2);font-weight:600}
.trend-bar-name{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:420px;width:100%;animation:bounceIn .3s ease}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
@media(max-width:480px){.toast-container{left:16px;right:16px}}
.toast{padding:13px 17px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;max-width:340px;box-shadow:var(--shadow-lg);animation:bounceIn .35s ease;border:1px solid var(--border2)}
.toast-success{background:#0a2016;color:var(--green);border-color:rgba(52,211,153,.2)}
.toast-error{background:#200a0a;color:var(--red);border-color:rgba(248,113,113,.2)}
.toast-info{background:#0d0c1f;color:var(--accent2);border-color:rgba(124,106,247,.2)}
.light .toast-success{background:#f0fdf8}.light .toast-error{background:#fff5f5}.light .toast-info{background:#f5f3ff}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.sync-dot.syncing{background:var(--yellow);animation:dotPulse 1s ease infinite}
.sync-label{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;margin-top:3px}
.footer{text-align:center;padding:28px 24px 40px;color:var(--text3);font-size:13px}
.footer span{color:var(--accent)}
@media(max-width:480px){.calc-grid,.subjects-grid{grid-template-columns:1fr}}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

/* ── Extension Sync Banner ── */
.ext-sync-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s ease}
.ext-sync-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:500px;width:100%;animation:bounceIn .3s ease;max-height:88vh;overflow-y:auto}
.ext-sync-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.ext-sync-icon{font-size:36px;flex-shrink:0}
.ext-sync-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800}
.ext-sync-sub{font-size:12px;color:var(--text2);margin-top:3px}
.ext-sync-controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ext-sync-count{font-size:12px;color:var(--text2);margin-left:auto}
.ext-subj-list{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;margin-bottom:18px;padding-right:2px}
.ext-subj-list::-webkit-scrollbar{width:4px}
.ext-subj-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ext-subj-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;user-select:none}
.ext-subj-row.sel{background:rgba(124,106,247,.08);border:1.5px solid rgba(124,106,247,.35)}
.ext-subj-row.unsel{background:var(--surface);border:1.5px solid var(--border)}
.ext-checkbox{width:19px;height:19px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;transition:all .15s}
.ext-checkbox.on{background:var(--accent);border:2px solid var(--accent)}
.ext-checkbox.off{background:transparent;border:2px solid var(--border2)}
.ext-subj-info{flex:1;min-width:0}
.ext-subj-name{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ext-subj-meta{font-size:11px;color:var(--text2);margin-top:2px}
.ext-subj-pct{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;flex-shrink:0}
.ext-subj-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:100px;margin-top:3px;display:block;text-align:center}
.ext-footer-btns{display:flex;gap:10px;justify-content:flex-end}
.ext-done-wrap{text-align:center;padding:18px 0 8px}
.ext-done-icon{font-size:56px;margin-bottom:12px}
.ext-done-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--green);margin-bottom:6px}
.ext-done-sub{font-size:13px;color:var(--text2);line-height:1.6}
.ext-footer-btns{display:flex;gap:10px;justify-content:flex-end}
.ext-active-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--green);background:var(--green-bg);border:1px solid rgba(52,211,153,.22);padding:4px 10px;border-radius:100px;animation:fadeIn .4s ease}
.ext-pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:dotPulse 2s ease infinite}

/* ── AutoFetch Banner ── */
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes ripple{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.4);opacity:0}}
@keyframes shine{0%{left:-100%}100%{left:200%}}
.cv-fetch-banner{position:relative;overflow:hidden;margin-bottom:24px;background:linear-gradient(135deg,rgba(124,106,247,.12),rgba(52,211,153,.07),rgba(124,106,247,.12));background-size:200% 200%;animation:gradientShift 6s ease infinite,fadeUp .5s ease .1s both;border:1px solid rgba(124,106,247,.28);border-radius:var(--radius);padding:22px 26px;}
.cv-banner-inner{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.cv-banner-icon{position:relative;width:52px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(124,106,247,.25),rgba(52,211,153,.15));border-radius:14px;border:1px solid rgba(124,106,247,.3);font-size:24px;}
.cv-banner-icon::after{content:'';position:absolute;inset:0;border-radius:14px;border:2px solid rgba(124,106,247,.4);animation:ripple 2.2s ease-out infinite;}
.cv-banner-text{flex:1;min-width:180px;}
.cv-banner-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:3px;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cv-banner-sub{font-size:12px;color:var(--text2);line-height:1.5;}
.cv-banner-steps{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
.cv-step{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);font-weight:500;}
.cv-step span{background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:100px;font-weight:700;color:var(--text2);}
.cv-step-arrow{color:var(--text3);font-size:10px;}
.cv-fetch-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(124,106,247,.4);transition:all .2s;white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden;}
.cv-fetch-btn:hover{box-shadow:0 6px 28px rgba(124,106,247,.6);transform:translateY(-2px);}
.cv-fetch-btn:active{transform:scale(.97);}
.cv-fetch-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.cv-fetch-btn-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shine 2.5s ease infinite;}
.cv-no-ext{margin-top:10px;padding:10px 14px;border-radius:var(--radius-sm);background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);font-size:12px;color:var(--yellow);line-height:1.6;}
.cv-fetching-state{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.2);border-radius:var(--radius-sm);font-size:12px;color:var(--accent2);font-weight:600;flex-shrink:0;}
.cv-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent2);margin:0 2px;animation:dotPulse 1.2s ease infinite;}
.cv-dot:nth-child(2){animation-delay:.2s;}.cv-dot:nth-child(3){animation-delay:.4s;}
.ext-active-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--green);background:var(--green-bg);border:1px solid rgba(52,211,153,.22);padding:4px 10px;border-radius:100px;animation:fadeIn .4s ease;}
.ext-pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:dotPulse 2s ease infinite;}

/* ── Popup Scraper (No Extension Needed) ── */
.popscrape-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.popscrape-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:420px;width:100%;animation:bounceIn .3s ease;text-align:center}
.popscrape-spinner{font-size:42px;animation:spin 1.2s linear infinite;display:block;margin-bottom:14px}
.popscrape-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.popscrape-sub{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:18px}
.popscrape-steps{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;text-align:left}
.popscrape-step{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;background:var(--surface);border:1px solid var(--border)}
.popscrape-step.done{background:var(--green-bg);border-color:rgba(52,211,153,.25);color:var(--green)}
.popscrape-step.active{background:rgba(124,106,247,.08);border-color:rgba(124,106,247,.3);color:var(--accent2)}
.popscrape-step.wait{color:var(--text3)}
.popscrape-step-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.popscrape-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:18px}
.popscrape-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .6s ease}
.popscrape-warn{padding:10px 14px;border-radius:var(--radius-sm);background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);font-size:12px;color:var(--yellow);line-height:1.6;margin-bottom:14px;text-align:left}
</style>
</head>
<body>
<div id="root"></div>

<!-- ✅ CORRECT ORDER: React first, then Firebase, then init, then app -->

<!-- 1. React + Babel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<!-- 2. Firebase SDKs (synchronous, blocking) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- 4. React App (Babel transpiles JSX, runs after all scripts above) -->
<script type="text/babel">
const { useState, useEffect } = React;

const calcAtt   = (c,a) => (!c||c===0)?0:Math.round((a/c)*1000)/10;
const getStatus = (p,t) => p>=t?'safe':p>=t-10?'risk':'danger';
const sColor    = s => s==='safe'?'var(--green)':s==='risk'?'var(--yellow)':'var(--red)';
const canBunk   = (c,a,t) => { const m=Math.floor((a*100/t)-c); return m>0?m:0; };
const needAtt   = (c,a,t) => { if(t>=100)return 999; const x=Math.ceil((t*c-100*a)/(100-t)); return x>0?x:0; };
const motivate  = (p,t,b) => {
  if(p===0) return '📚 Attend at least one class first...';
  if(p>=t+20) return '😎 You\'re safe! You can skip '+b+' more classes!';
  if(p>=t+10) return '🎯 Solid! You have some room to skip — chill!';
  if(p>=t)    return '✅ On target. Don\'t skip even one more!';
  if(p>=t-10) return '⚠️ Risky! Attend classes or you\'ll be short!';
  if(p>=t-20) return '😬 Danger! Attend classes or you\'ll be short 💀';
  return '🚨 SOS! Improve attendance — you may miss exams!';
};

let _tid=0, _add=null;
const toast = (msg, type='info') => _add && _add({id:++_tid, msg, type});

function ToastContainer() {
  const [list, set] = useState([]);
  _add = t => { set(p=>[...p,t]); setTimeout(()=>set(p=>p.filter(x=>x.id!==t.id)), 3200); };
  return (
    <div className="toast-container">
      {list.map(t=>(
        <div key={t.id} className={`toast toast-${t.type}`}>
          {t.type==='success'?'✅':t.type==='error'?'❌':'💡'} {t.msg}
        </div>
      ))}
    </div>
  );
}

function Ring({pct, target, size=180, sw=10}) {
  const r=(size-sw*2)/2, circ=2*Math.PI*r, color=sColor(getStatus(pct,target));
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg style={{transform:'rotate(-90deg)'}} width={size} height={size}>
        <circle fill="none" stroke="var(--border)" strokeWidth={sw} cx={size/2} cy={size/2} r={r}/>
        <circle fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round"
          cx={size/2} cy={size/2} r={r} strokeDasharray={circ}
          strokeDashoffset={circ-(Math.min(pct,100)/100)*circ}
          style={{transition:'stroke-dashoffset .8s cubic-bezier(0.34,1.56,0.64,1),stroke .4s'}}/>
      </svg>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:size===180?'32px':'15px',fontWeight:800,color,lineHeight:1}}>
          {pct.toFixed(size===180?1:0)}%
        </div>
        {size===180 && <div style={{fontSize:'11px',color:'var(--text2)',marginTop:3}}>attendance</div>}
      </div>
    </div>
  );
}

function MiniBar({pct, target}) {
  const color = sColor(getStatus(pct,target));
  return (
    <div className="mini-bar-wrap">
      <div className="mini-bar-header"><span>0%</span><span style={{color}}>● {pct.toFixed(1)}%</span><span>100%</span></div>
      <div className="mini-bar-track">
        <div className="mini-bar-fill" style={{width:`${Math.min(pct,100)}%`,background:color}}/>
      </div>
      <div className="mini-bar-header"><span/><span style={{color:'var(--text3)',fontSize:'10px'}}>Target: {target}%</span><span/></div>
    </div>
  );
}

function AuthScreen({onAuth}) {
  const [mode,setMode]       = useState('login');
  const [name,setName]       = useState('');
  const [email,setEmail]     = useState('');
  const [pass,setPass]       = useState('');
  const [showPw,setShowPw]   = useState(false);
  const [loading,setLoading] = useState(false);
  const [errors,setErrors]   = useState({});
  const [resetSent,setResetSent] = useState(false);

  function validate() {
    const e={};
    if(mode==='signup' && !name.trim()) e.name='Name required';
    if(!email.trim()) e.email='Email required';
    else if(!/\S+@\S+\.\S+/.test(email)) e.email='Invalid email';
    if(mode!=='forgot' && (!pass || pass.length<6)) e.pass='Min 6 characters';
    return e;
  }

  async function submit() {
    const e=validate(); setErrors(e);
    if(Object.keys(e).length) return;
    setLoading(true);
    try {
      if(mode==='forgot') {
        await auth.sendPasswordResetEmail(email.trim());
        setResetSent(true);
      } else if(mode==='login') {
        const c = await auth.signInWithEmailAndPassword(email.trim(), pass);
        toast('Welcome back! 👋','success');
        onAuth(c.user);
      } else {
        const c = await auth.createUserWithEmailAndPassword(email.trim(), pass);
        await c.user.updateProfile({displayName: name.trim()});
        toast(`Welcome ${name}! 🎉`,'success');
        onAuth(c.user);
      }
    } catch(err) {
      const m = err.code==='auth/user-not-found'       ? 'No account found with this email' :
                err.code==='auth/wrong-password'       ? 'Wrong password 🙈' :
                err.code==='auth/email-already-in-use' ? 'Email already registered' :
                err.code==='auth/too-many-requests'    ? 'Too many attempts. Please wait!' :
                err.code==='auth/invalid-email'        ? 'Invalid email format' :
                err.message;
      toast(m,'error');
    }
    setLoading(false);
  }

  function switchMode(m) { setMode(m); setErrors({}); setResetSent(false); }

  return (
    <div className="auth-page">
      <div className="glass auth-card">
        <div className="auth-logo">
          <span className="auth-logo-icon">🎓</span>
          <div className="auth-logo-title">Bunk<span>Planner</span> Pro</div>
          <div className="auth-logo-sub">Bunk smarter, not harder 😎</div>
        </div>

        {/* ── FORGOT PASSWORD VIEW ── */}
        {mode==='forgot' ? (
          <div className="auth-stack">
            {resetSent ? (
              <div style={{textAlign:'center',padding:'10px 0'}}>
                <div style={{fontSize:'48px',marginBottom:'12px'}}>📧</div>
                <div style={{fontFamily:'Syne,sans-serif',fontSize:'18px',fontWeight:800,color:'var(--green)',marginBottom:'8px'}}>
                  Email Sent!
                </div>
                <div style={{fontSize:'13px',color:'var(--text2)',lineHeight:'1.7',marginBottom:'20px'}}>
                  A password reset link has been sent to <strong style={{color:'var(--text)'}}>{email}</strong>.<br/>
                  Check your inbox (including Spam 😄)
                </div>
                <button className="btn btn-primary btn-full" onClick={()=>switchMode('login')}>
                  🔑 Login Pe Wapas Jao
                </button>
              </div>
            ) : (
              <>
                <div style={{textAlign:'center',marginBottom:'16px'}}>
                  <div style={{fontSize:'36px',marginBottom:'8px'}}>🔐</div>
                  <div style={{fontFamily:'Syne,sans-serif',fontSize:'16px',fontWeight:700,color:'var(--text)'}}>Password Reset</div>
                  <div style={{fontSize:'12px',color:'var(--text2)',marginTop:'4px'}}>Enter your email — we'll send a reset link</div>
                </div>
                <div className="input-wrap">
                  <label className="input-label">Registered Email</label>
                  <input className={`input ${errors.email?'error':''}`} type="email" placeholder="you@email.com"
                    value={email} onChange={e=>{setEmail(e.target.value);setErrors(p=>({...p,email:''}))}}
                    onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
                  {errors.email && <span className="input-hint">{errors.email}</span>}
                </div>
                <button className="btn btn-primary btn-full" onClick={submit} disabled={loading}>
                  {loading ? '⏳ Sending...' : '📧 Send Reset Link'}
                </button>
                <button onClick={()=>switchMode('login')}
                  style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:'12px',marginTop:'8px',width:'100%'}}>
                  ← Back to Login
                </button>
              </>
            )}
          </div>
        ) : (
          <>
            <div className="auth-tabs">
              <button className={`auth-tab ${mode==='login'?'active':''}`} onClick={()=>switchMode('login')}>🔑 Login</button>
              <button className={`auth-tab ${mode==='signup'?'active':''}`} onClick={()=>switchMode('signup')}>✨ Sign Up</button>
            </div>
            <div className="auth-stack">
              {mode==='signup' && (
                <div className="input-wrap">
                  <label className="input-label">Your Name</label>
                  <input className={`input ${errors.name?'error':''}`} placeholder="e.g. Mohit Sharma"
                    value={name} onChange={e=>{setName(e.target.value);setErrors(p=>({...p,name:''}))}}
                    onKeyDown={e=>e.key==='Enter'&&submit()}/>
                  {errors.name && <span className="input-hint">{errors.name}</span>}
                </div>
              )}
              <div className="input-wrap">
                <label className="input-label">Email</label>
                <input className={`input ${errors.email?'error':''}`} type="email" placeholder="you@email.com"
                  value={email} onChange={e=>{setEmail(e.target.value);setErrors(p=>({...p,email:''}))}}
                  onKeyDown={e=>e.key==='Enter'&&submit()}/>
                {errors.email && <span className="input-hint">{errors.email}</span>}
              </div>
              <div className="input-wrap">
                <label className="input-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  Password
                  {mode==='login' && (
                    <button onClick={()=>switchMode('forgot')}
                      style={{background:'none',border:'none',color:'var(--accent2)',fontSize:'11px',fontWeight:600,cursor:'pointer',padding:0}}>
                      Forgot Password?
                    </button>
                  )}
                </label>
                <div className="input-group">
                  <input className={`input ${errors.pass?'error':''}`} type={showPw?'text':'password'} placeholder="Min 6 characters"
                    value={pass} onChange={e=>{setPass(e.target.value);setErrors(p=>({...p,pass:''}))}}
                    onKeyDown={e=>e.key==='Enter'&&submit()}/>
                  <button className="input-eye" onClick={()=>setShowPw(p=>!p)} type="button">{showPw?'🙈':'👁️'}</button>
                </div>
                {errors.pass && <span className="input-hint">{errors.pass}</span>}
              </div>
              <button className="btn btn-primary btn-full" onClick={submit} disabled={loading}>
                {loading ? '⏳ Please wait...' : mode==='login' ? '🚀 Login' : '✨ Create Account'}
              </button>
            </div>
            <div style={{textAlign:'center',marginTop:'20px',fontSize:'12px',color:'var(--text3)'}}>
              {mode==='login' ? "Don't have an account? " : 'Already registered? '}
              <button onClick={()=>switchMode(mode==='login'?'signup':'login')}
                style={{background:'none',border:'none',color:'var(--accent2)',fontWeight:700,cursor:'pointer',fontSize:'12px'}}>
                {mode==='login' ? 'Sign Up Free' : 'Login'}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function Calculator() {
  const [c,setC]=useState(''), [a,setA]=useState(''), [t,setT]=useState('75');
  const [errors,setErrors]=useState({}), [result,setResult]=useState(null), [loading,setLoading]=useState(false);

  function validate() {
    const e={};
    if(!c||isNaN(c)||+c<0) e.c='Enter a valid number';
    if(!a||isNaN(a)||+a<0) e.a='Enter a valid number';
    if(!t||isNaN(t)||+t<1||+t>100) e.t='1-100 only';
    if(!e.c&&!e.a&&+a>+c) e.a='Cannot exceed total';
    return e;
  }

  function calculate() {
    const e=validate(); setErrors(e);
    if(Object.keys(e).length) return;
    setLoading(true);
    setTimeout(()=>{
      const pct=calcAtt(+c,+a), tgt=+t;
      setResult({pct, status:getStatus(pct,tgt), bunk:canBunk(+c,+a,tgt), need:needAtt(+c,+a,tgt), target:tgt});
      setLoading(false);
    }, 500);
  }

  const r=result;
  return (
    <div className="calc-grid">
      <div className="glass calc-card" style={{animation:'fadeUp .4s ease'}}>
        <div className="section-title">🧮 Calculator</div>
        <div className="inputs-stack">
          <div className="input-wrap">
            <label className="input-label">Total Classes Conducted</label>
            <input className={`input ${errors.c?'error':''}`} type="number" min="0" placeholder="e.g. 40"
              value={c} onChange={e=>{setC(e.target.value);setErrors(p=>({...p,c:''}))}}/>
            {errors.c && <span className="input-hint">{errors.c}</span>}
          </div>
          <div className="input-wrap">
            <label className="input-label">Classes Attended</label>
            <input className={`input ${errors.a?'error':''}`} type="number" min="0" placeholder="e.g. 30"
              value={a} onChange={e=>{setA(e.target.value);setErrors(p=>({...p,a:''}))}}/>
            {errors.a && <span className="input-hint">{errors.a}</span>}
          </div>
          <div className="input-wrap">
            <label className="input-label">Target Attendance %</label>
            <input className={`input ${errors.t?'error':''}`} type="number" min="1" max="100" placeholder="75"
              value={t} onChange={e=>{setT(e.target.value);setErrors(p=>({...p,t:''}))}}/>
            {errors.t && <span className="input-hint">{errors.t}</span>}
          </div>
          <button className="btn btn-primary btn-full" onClick={calculate}>
            {loading ? '⏳ Calculating...' : '⚡ Calculate'}
          </button>
        </div>
      </div>
      <div className="glass calc-card" style={{animation:'fadeUp .4s ease .1s both'}}>
        <div className="section-title">📊 Analysis</div>
        {loading && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'14px',paddingTop:'10px'}}>
            <div className="skeleton" style={{width:'130px',height:'130px',borderRadius:'50%'}}/>
            <div className="skeleton" style={{width:'85%',height:'14px'}}/>
          </div>
        )}
        {!loading && !r && (
          <div style={{textAlign:'center',padding:'36px 0',color:'var(--text3)'}}>
            <div style={{fontSize:'48px',marginBottom:'14px',opacity:.4}}>📐</div>
            <div style={{fontSize:'13px'}}>Enter values and hit Calculate</div>
          </div>
        )}
        {!loading && r && (
          <div className="circle-wrap">
            <Ring pct={r.pct} target={r.target}/>
            <MiniBar pct={r.pct} target={r.target}/>
            <div className={`result-box result-${r.status}`} style={{width:'100%'}}>
              <div className="result-icon">{r.pct>=r.target?'😎':r.status==='risk'?'⚠️':'🚨'}</div>
              <div>
                <div className="result-title">{r.pct>=r.target?"You're Safe!":r.status==='risk'?'Risky Zone!':'Danger Zone!'}</div>
                <div className="result-detail">
                  {r.pct>=r.target
                    ? `Bunk ${r.bunk} more class${r.bunk!==1?'es':''} safely`
                    : `Attend ${r.need} class${r.need!==1?'es':''} to reach ${r.target}%`}
                </div>
              </div>
            </div>
            <div className="motivation" style={{width:'100%'}}>{motivate(r.pct,r.target,r.bunk)}</div>
          </div>
        )}
      </div>
    </div>
  );
}

function SubjectCard({subject, onEdit, onDelete, target}) {
  const pct=calcAtt(subject.conducted,subject.attended), st=getStatus(pct,target), color=sColor(st);
  return (
    <div className={`glass subject-card ${st}`} style={{animation:'bounceIn .35s ease'}}>
      <div className="subject-name">
        <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:'8px'}}>{subject.name}</span>
        <div className="subject-actions">
          <button onClick={()=>onEdit(subject)}>✏️</button>
          <button onClick={()=>onDelete(subject.id)}>🗑️</button>
        </div>
      </div>
      <div className="subject-stats">
        <div className="subject-stat"><div className="subject-stat-val" style={{color}}>{pct.toFixed(1)}%</div><div className="subject-stat-label">Attendance</div></div>
        <div className="subject-stat"><div className="subject-stat-val">{subject.attended}</div><div className="subject-stat-label">Attended</div></div>
        <div className="subject-stat"><div className="subject-stat-val">{subject.conducted}</div><div className="subject-stat-label">Total</div></div>
      </div>
      <MiniBar pct={pct} target={target}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'12px'}}>
        <span className={`badge badge-${st}`}>{st==='safe'?'✅ Safe':st==='risk'?'⚠️ Risk':'🚨 Danger'}</span>
        <span style={{fontSize:'12px',color:'var(--text2)'}}>
          {pct>=target ? `🎉 Bunk ${canBunk(subject.conducted,subject.attended,target)}` : `📚 Need ${needAtt(subject.conducted,subject.attended,target)}`}
        </span>
      </div>
    </div>
  );
}

function Subjects({user}) {
  const [subjects,setSubjects] = useState([]);
  const [syncing,setSyncing]   = useState(true);
  const [TARGET, setTargetRaw] = useState(() => {
    const n = parseInt(localStorage.getItem('bpp_threshold'));
    return (n >= 1 && n <= 100) ? n : 75;
  });
  function setTarget(v) {
    const n = Math.min(100, Math.max(1, parseInt(v) || 75));
    setTargetRaw(n);
    localStorage.setItem('bpp_threshold', n);
  }
  const [showAdd,setShowAdd]   = useState(false);
  const [editModal,setEdit]    = useState(null);
  const [form,setForm]         = useState({name:'',conducted:'',attended:''});
  const [fErr,setFErr]         = useState({});

  const col = (firebaseReady && user)
    ? db.collection('users').doc(user.uid).collection('subjects')
    : null;

function parseCyberVidyaData(raw) {
  /*
    KIET CyberVidya copy-paste format — supports:

    FORMAT A (paired lines):
      Line1: "1ANN and Machine Learning"
      Line2: "BLENDEDCS303B-...CS4C1642483%"

    FORMAT B (everything on one line per subject):
      "1ANN and Machine LearningBLENDEDCS303B-...CS4C1642483%"

    Numbers at end: Presents, Special, Lectures, Pct% — all jammed together
    attended = Presents + Special,  conducted = Lectures

    KEY FIX: Subjects with same name but different component
    (e.g. "Design and Analysis of Al..." THEORY vs PRACTICAL)
    get " (Lab)" appended to PRACTICAL so they don't collide.
  */
  const results = [];
  if (!raw || !raw.trim()) return results;

  const lines = raw.split(/[\r\n]+/).map(l => l.trim()).filter(Boolean);
  const SKIP = /^(s\.?no\.?|course|component|variant|presents|special|lectures|attendance|%|course component|course variant|special attendance)$/i;
  const COMPONENT_RX = /^(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i;

  function getNameWithSuffix(nameStr, dataLine) {
    const compMatch = dataLine.match(/^(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
    const component = compMatch ? compMatch[1].toUpperCase() : '';
    let name = cleanName(nameStr.replace(/^\d+\s*/, '').trim().replace(/\.\.\.$/,'').trim());
    if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';
    return name;
  }

  // ── STRATEGY 1: Paired lines (CyberVidya Ctrl+A format) ─
  for (let i = 0; i < lines.length - 1; i++) {
    const nameLine = lines[i];
    const dataLine = lines[i + 1];

    if (!/%$/.test(dataLine)) continue;
    if (!COMPONENT_RX.test(dataLine)) continue;

    const nameStripped = nameLine.replace(/^\d+\s*/, '').trim().replace(/\.\.\.$/,'').trim();
    if (!nameStripped || nameStripped.length < 3) continue;
    if (SKIP.test(nameStripped) || COMPONENT_RX.test(nameStripped)) continue;
    if (!/[A-Za-z]{3,}/.test(nameStripped)) continue;

    const nums = parseKIETNumbers(dataLine);
    if (!nums) continue;

    const attended = Math.min(nums.presents + nums.special, nums.lectures);
    const name = getNameWithSuffix(nameStripped, dataLine);
    results.push({ name, attended, conducted: nums.lectures });
    i++;
  }

  // ── STRATEGY 2: Everything on ONE line per subject ───────
  // Format: "1ANN and Machine LearningBLENDEDCS303B-...1642483%"
  if (results.length === 0) {
    for (const line of lines) {
      if (!/%$/.test(line)) continue;
      const compMatch = line.match(/(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
      if (!compMatch) continue;

      const compIdx = line.search(/(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
      let namePart = line.slice(0, compIdx).replace(/^\d+/, '').trim().replace(/\.\.\.$/,'').trim();
      if (!namePart || namePart.length < 3) continue;

      const component = compMatch[1].toUpperCase();
      const nums = parseKIETNumbers(line);
      if (!nums) continue;

      const attended = Math.min(nums.presents + nums.special, nums.lectures);
      let name = cleanName(namePart);
      if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';
      results.push({ name, attended, conducted: nums.lectures });
    }
  }

  // ── STRATEGY 3: Space-separated fallback ────────────────
  if (results.length === 0) {
    const flat = raw.replace(/[\r\n\t]+/g,' ').replace(/\s{2,}/g,' ');
    const rx = /(?:\d+\s+)?([A-Za-z][A-Za-z0-9&\-\s\.]{3,50}?)\s+(THEORY|PRACTICAL|BLENDED|LAB)\s+\S+\s+(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})\s+\d{1,3}%/gi;
    let m;
    while ((m = rx.exec(flat)) !== null) {
      const component = m[2].toUpperCase();
      let name = cleanName(m[1]);
      if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';
      const p = parseInt(m[3]), s = parseInt(m[4]), l = parseInt(m[5]);
      if (!name || l <= 0) continue;
      results.push({ name, attended: Math.min(p+s, l), conducted: l });
    }
  }

  // ── DEDUPLICATE by exact name (after Lab suffix) ─────────
  const seen = new Set();
  return results.filter(s => {
    if (!s.name || s.name.length < 2) return false;
    const k = s.name.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
}

// Extract P, S, L, Pct from jammed number string at end of CyberVidya data line
// e.g. "...CS4C1642483%" -> P=16, S=4, L=24, pct=83
function parseKIETNumbers(dataLine) {
  let lastLetterIdx = -1;
  for (let i = dataLine.length - 1; i >= 0; i--) {
    if (/[A-Za-z]/.test(dataLine[i])) { lastLetterIdx = i; break; }
  }
  if (lastLetterIdx === -1) return null;

  const tail = dataLine.slice(lastLetterIdx + 1).replace(/[^\d]/g, '');
  if (tail.length < 3) return null;

  const candidates = [];
  for (let p1 = 1; p1 <= 3; p1++) {
    for (let p2 = 0; p2 <= 2; p2++) {
      for (let p3 = 1; p3 <= 3; p3++) {
        const p4 = tail.length - p1 - p2 - p3;
        if (p4 < 1 || p4 > 3) continue;
        const P   = parseInt(tail.slice(0, p1));
        const S   = p2 > 0 ? parseInt(tail.slice(p1, p1 + p2)) : 0;
        const L   = parseInt(tail.slice(p1 + p2, p1 + p2 + p3));
        const Pct = parseInt(tail.slice(p1 + p2 + p3));
        if (Pct < 0 || Pct > 100) continue;
        if (L < 1 || L > 200)     continue;
        if (P < 0 || P > 200)     continue;
        if (S < 0 || S > 100)     continue;
        if (P + S > L + 1)        continue;
        const calc = (P + S) / L * 100;
        const diff = Math.abs(Math.round(calc) - Pct);
        if (diff <= 1) candidates.push({ presents: P, special: S, lectures: L, score: diff * 1000 + L });
      }
    }
  }
  if (!candidates.length) return null;
  candidates.sort((a, b) => a.score - b.score);
  return candidates[0];
}
function cleanName(s) {
  return (s || '')
    .replace(/\.\.\./g, '')
    .replace(/\s+/g, ' ')
    .replace(/[^\w\s\-&()\/]/g, '')
    .trim()
    .replace(/^[\d\s\.\-]+/, '')   // strip leading numbers
    .trim()
    .slice(0, 60);
}

//  parseCyberVidyaAPIData  —  handles JSON from extension API
// ══════════════════════════════════════════════════════════════
function parseCyberVidyaAPIData(apiData) {
  const results = [];
  try {
    const arr = Array.isArray(apiData) ? apiData
      : apiData.data       ? (Array.isArray(apiData.data)       ? apiData.data       : [apiData.data])
      : apiData.attendance ? apiData.attendance
      : apiData.result     ? apiData.result : [];
    for (const item of arr) {
      const name     = (item.courseName||item.course_name||item.subject||item.subjectName||item.name||'').trim();
      const presents = parseInt(item.presents||item.attended||item.present||0);
      const special  = parseInt(item.specialAttendance||item.special||0);
      const lectures = parseInt(item.lectures||item.totalLectures||item.conducted||0);
      if (name && lectures > 0)
        results.push({ name: name.slice(0,60), attended: Math.min(presents+special,lectures), conducted: lectures });
    }
  } catch(e) { console.warn('[BunkPlanner] API parse error:', e); }
  return results;
}

//  SyncBanner  —  shown when extension pushes data to the app

function SyncBanner({ subjects, user, onDone, onCancel }) {
  const [selected, setSelected] = useState(() => new Set(subjects.map((_,i) => i)));
  const [saving,   setSaving]   = useState(false);
  const [done,     setDone]     = useState(false);
  const [counts,   setCounts]   = useState(null);
  const [filter,   setFilter]   = useState('all'); // 'all' | 'safe' | 'risk' | 'danger'

  const TARGET = 75;

  const col = (firebaseReady && user)
    ? db.collection('users').doc(user.uid).collection('subjects')
    : null;

  /* helpers */
  const pctOf  = s => calcAtt(s.conducted, s.attended);
  const statOf = s => getStatus(pctOf(s), TARGET);

  function toggleSel(i) {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(i) ? n.delete(i) : n.add(i);
      return n;
    });
  }
  function selAll()  { setSelected(new Set(subjects.map((_,i) => i))); }
  function selNone() { setSelected(new Set()); }
  function selByStatus(st) {
    setSelected(new Set(subjects.map((_,i) => i).filter(i => statOf(subjects[i]) === st)));
  }

  /* Firebase save with dedup */
  async function handleImport() {
    if (!col)             { toast('Firebase not connected!', 'error'); return; }
    if (selected.size===0){ toast('Koi subject select nahi kiya!', 'error'); return; }
    setSaving(true);
    try {
      const toImport = subjects.filter((_,i) => selected.has(i));

      // Fetch existing subjects to dedup
      const snapshot = await col.get();
      const existingDocs = snapshot.docs;

      let added = 0, updated = 0;
      for (const s of toImport) {
        const nameKey = s.name.toLowerCase().trim();
        const match   = existingDocs.find(d => d.data().name.toLowerCase().trim() === nameKey);
        if (match) {
          // Update existing
          await col.doc(match.id).update({
            attended:    s.attended,
            conducted:   s.conducted,
            lastSynced:  firebase.firestore.FieldValue.serverTimestamp()
          });
          updated++;
        } else {
          // Add new
          await col.add({
            name:       s.name,
            attended:   s.attended,
            conducted:  s.conducted,
            createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
            lastSynced: firebase.firestore.FieldValue.serverTimestamp(),
            source:     'cybervidya-extension'
          });
          added++;
        }

      setCounts({ added, updated });
      setDone(true);

      setTimeout(onDone, 3000);

                {label:`✅ Safe (${safeCount})`,    val:'safe',   color:'var(--green)'},
                {label:`⚠️ Risk (${riskCount})`,    val:'risk',   color:'var(--yellow)'},
                {label:`🚨 Low (${dangerCount})`,   val:'danger', color:'var(--red)'},
              ].map(p => (
                <button key={p.val} onClick={() => setFilter(p.val)} style={{
                  padding:'4px 11px', borderRadius:'100px', border:'none', cursor:'pointer',

                  opacity:     filter===p.val ? 1 : 0.7

              >
                {saving
                  ? <><span style={{display:'inline-block',animation:'spin .7s linear infinite'}}>⏳</span> Saving...</>
                  : `☁️ Import ${selected.size} Subject${selected.size !== 1 ? 's' : ''} to Firebase`}
              </button>
            </div>
          </>
        ) : (
          /* ── Done state ── */
          <div className="ext-done-wrap">
            <div className="ext-done-icon">🎉</div>
            <div className="ext-done-title">Sync Complete!</div>
            <div className="ext-done-sub">
              {counts?.added   > 0 && <div>✅ <strong>{counts.added}</strong> new subject{counts.added!==1?'s':''} added</div>}
              {counts?.updated > 0 && <div>🔄 <strong>{counts.updated}</strong> subject{counts.updated!==1?'s':''} updated</div>}
              <div style={{marginTop:8,color:'var(--text3)',fontSize:'12px'}}>
                Data synced to Firebase ☁️ — visible on all devices!
              </div>
            </div>
            <button className="btn btn-primary" style={{marginTop:20,width:'100%'}} onClick={onDone}>
              ✅ Done!
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════════════
//  CyberVidyaScraper — Popup-based scraper, NO extension needed
//  Works on mobile + desktop, no CORS issues via popup window
// ══════════════════════════════════════════════════════════════

// ── The scraper script injected into the popup via URL hash ──
// When CyberVidya loads in popup, it reads location.hash, finds
// this code, and postMessages parsed data back to parent window.
const SCRAPER_SCRIPT = `
(function() {
  'use strict';
  if (window.__bpp_injected) return;
  window.__bpp_injected = true;

  const PARENT = window.opener;
  if (!PARENT) return;

  function post(type, payload) {
    try { PARENT.postMessage({ _bpp: true, type, payload }, '*'); } catch(e) {}
  }

  function parseTable() {
    const results = [];
    const seen    = new Set();
    const tables  = document.querySelectorAll('table');

    for (const table of tables) {
      const rows = Array.from(table.querySelectorAll('tr'));
      if (rows.length < 3) continue;

      let hdr = null, hdrIdx = -1;
      for (let i = 0; i < Math.min(rows.length, 5); i++) {
        const cells = Array.from(rows[i].querySelectorAll('th,td'))
                          .map(c => c.innerText.trim().toLowerCase());
        if (cells.some(c => c === 'course') &&
            (cells.some(c => c === 'presents' || c === 'present') || cells.some(c => c === 'lectures'))) {
          hdr = cells; hdrIdx = i; break;
        }
      }
      if (!hdr || hdrIdx < 0) continue;

      let cCourse=-1, cComp=-1, cPresents=-1, cSpecial=-1, cLectures=-1;
      hdr.forEach((h,i) => {
        if (h === 'course')                                     cCourse   = i;
        else if (h === 'course component' || h === 'component') cComp     = i;
        else if (h === 'presents' || h === 'present')           cPresents = i;
        else if (h.includes('special'))                         cSpecial  = i;
        else if (h === 'lectures')                              cLectures = i;
      });
      if (cCourse < 0 || cLectures < 0) continue;

      for (let i = hdrIdx + 1; i < rows.length; i++) {
        const tds   = Array.from(rows[i].querySelectorAll('td'));
        if (tds.length <= Math.max(cCourse, cLectures)) continue;
        const texts = tds.map(t => t.innerText.trim());
        if (!/^\d+$/.test(texts[0])) continue;

        const rawName = texts[cCourse] || '';
        if (!rawName || rawName.length < 3) continue;
        if (/^(BLENDED|THEORY|PRACTICAL|LAB|TUTORIAL)$/i.test(rawName)) continue;
        if (/^\d+$/.test(rawName)) continue;

        const name = rawName.replace(/\.{2,}$/, '').trim().slice(0, 60);
        if (name.length < 2) continue;

        const comp   = (cComp >= 0 && cComp < texts.length) ? texts[cComp].toUpperCase() : '';
        const suffix = (comp === 'PRACTICAL' || comp === 'LAB') ? ' (Lab)' : '';
        const full   = name + suffix;
        const key    = full.toLowerCase();
        if (seen.has(key)) continue;

        const P = cPresents >= 0 ? (parseInt(texts[cPresents]) || 0) : 0;
        const S = cSpecial  >= 0 ? (parseInt(texts[cSpecial])  || 0) : 0;
        const L = parseInt(texts[cLectures]) || 0;
        if (L <= 0) continue;

        seen.add(key);
        results.push({ name: full, attended: Math.min(P + S, L), conducted: L });
      }
      if (results.length > 0) break;
    }
    return results;
  }

  function tableReady() {
    const tables = document.querySelectorAll('table');
    for (const t of tables) {
      if (t.querySelectorAll('tbody tr').length > 0 && (t.innerText||'').includes('%')) return true;
    }
    return false;
  }

  function tryParse() {
    const subjects = parseTable();
    if (subjects.length > 0) {
      post('done', { subjects });
      return true;
    }
    return false;
  }

  function run() {
    // If not on attendance page, navigate there immediately
    if (!window.location.href.includes('my-attendance')) {
      post('status', { step: 'navigating' });
      window.location.href = 'https://kiet.cybervidya.net/attendance/my-attendance';
      return;
    }

    post('status', { step: 'checking' });

    // Try immediately — table may already be loaded
    if (tableReady()) {
      post('status', { step: 'scraping' });
      if (tryParse()) return;
    }

    // Use MutationObserver — fires as soon as table rows appear (much faster than polling)
    let done = false;
    const obs = new MutationObserver(() => {
      if (done) return;
      if (tableReady()) {
        done = true;
        obs.disconnect();
        post('status', { step: 'scraping' });
        if (!tryParse()) {
          post('error', { msg: 'Could not read attendance. Please login to CyberVidya.' });
        }
      }
    });
    obs.observe(document.documentElement, { childList: true, subtree: true });

    // Fallback timeout — if table never appears in 12s
    setTimeout(() => {
      if (!done) {
        done = true;
        obs.disconnect();
        post('error', { msg: 'Attendance table not found. Please login to CyberVidya and try again.' });
      }
    }, 12000);
  }

  // Watch for SPA navigation (URL changes without page reload)
  let lastUrl = location.href;
  new MutationObserver(() => {
    if (location.href !== lastUrl) {
      lastUrl = location.href;
      window.__bpp_injected = false; // allow re-run
      setTimeout(run, 300);
    }
  }).observe(document.documentElement, { childList: true, subtree: true });

  // Run immediately — no artificial delay
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
`;

// ── AutoFetchBanner component ─────────────────────────────────
function AutoFetchBanner({ extInstalled: extProp, onDataReceived }) {
  // phase: 'idle' | 'popup_open' | 'waiting' | 'scraping' | 'done' | 'error'
  const [phase,     setPhaseState] = useState('idle');
  const [statusMsg, setStatusMsg]  = useState('');
  const [progress,  setProgress]   = useState(0);
  const phaseRef  = React.useRef('idle');
  const popupRef  = React.useRef(null);
  const timerRef  = React.useRef(null);

  function setPhase(p) { phaseRef.current = p; setPhaseState(p); }

  // ── Inject scraper into popup via <script> tag ────────────
  function injectScraperIntoPopup(popup) {
    try {
      const doc = popup.document;
      if (!doc) return false;
      // Only inject once
      if (doc.getElementById('_bpp_scraper')) return true;
      const s = doc.createElement('script');
      s.id = '_bpp_scraper';
      s.textContent = SCRAPER_SCRIPT;
      (doc.head || doc.body || doc.documentElement).appendChild(s);
      return true;
    } catch(e) {
      // Cross-origin — can't inject yet (page hasn't loaded or is on CyberVidya login)
      return false;
    }
  }

  // ── Main: open popup window ───────────────────────────────
  function handleFetch() {
    if (phaseRef.current !== 'idle') return;
    setPhase('popup_open');
    setStatusMsg('Opening CyberVidya in a popup...');
    setProgress(10);

    const W = Math.min(960, window.screen.width  - 40);
    const H = Math.min(700, window.screen.height - 60);
    const L = Math.round((window.screen.width  - W) / 2);
    const T = Math.round((window.screen.height - H) / 2);

    const popup = window.open(
      'https://kiet.cybervidya.net/attendance/my-attendance',
      'bpp_scraper_popup',
      `width=${W},height=${H},left=${L},top=${T},resizable=yes,scrollbars=yes`
    );

    if (!popup) {
      setPhase('error');
      setStatusMsg('Popup was blocked! Please allow popups for this site and try again.');
      return;
    }

    popupRef.current = popup;

    // ── Inject scraper as fast as possible (100ms polling) ──
    let injectAttempts = 0;
    const injectInterval = setInterval(() => {
      injectAttempts++;
      if (popup.closed) { clearInterval(injectInterval); return; }
      const injected = injectScraperIntoPopup(popup);
      if (injected) {
        clearInterval(injectInterval);
        console.log('[BPP] Scraper injected into popup ✅');
      }
      if (injectAttempts > 80) clearInterval(injectInterval); // 8s max
    }, 100);

    // ── Timeout: 90 seconds total ─────────────────────────────
    timerRef.current = setTimeout(() => {
      if (phaseRef.current !== 'idle' && phaseRef.current !== 'done') {
        setPhase('error');
        setStatusMsg('Timeout. Please login to CyberVidya and try again.');
        if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
      }
    }, 90000);
  }

  // ── Listen for postMessage from popup ─────────────────────
  useEffect(() => {
    function onMessage(e) {
      const data = e.data;
      if (!data || !data._bpp) return;

      console.log('[BPP] postMessage:', data.type, data.payload);

      if (data.type === 'status') {
        const step = data.payload?.step;
        if (step === 'navigating') { setStatusMsg('Navigating to attendance page...'); setProgress(30); }
        if (step === 'checking')   { setStatusMsg('Detecting attendance table...'); setPhase('waiting'); setProgress(55); }
        if (step === 'scraping')   { setStatusMsg('Reading your attendance data...'); setPhase('scraping'); setProgress(88); }
      }

      if (data.type === 'done') {
        clearTimeout(timerRef.current);
        const subs = (data.payload?.subjects || []).filter(s => s.name && s.conducted > 0);
        if (subs.length > 0) {
          setProgress(100);
          setPhase('done');
          setStatusMsg(`${subs.length} subjects fetched!`);
          // Close popup after short delay
          // Close popup immediately
          setTimeout(() => {
            if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
          }, 200);
          // Show import banner quickly
          setTimeout(() => {
            setPhase('idle');
            setStatusMsg('');
            setProgress(0);
            onDataReceived(subs);
          }, 500);
        } else {
          setPhase('error');
          setStatusMsg('No subjects found. Please make sure you are logged in.');
        }
      }

      if (data.type === 'error') {
        clearTimeout(timerRef.current);
        setPhase('error');
        setStatusMsg(data.payload?.msg || 'Something went wrong. Please try again.');
        setProgress(0);
      }
    }

    window.addEventListener('message', onMessage);
    return () => window.removeEventListener('message', onMessage);
  }, [onDataReceived]);

  // ── Detect popup closed manually ─────────────────────────
  useEffect(() => {
    if (!['popup_open','waiting','scraping'].includes(phase)) return;
    const iv = setInterval(() => {
      if (popupRef.current && popupRef.current.closed) {
        clearInterval(iv);
        if (phaseRef.current !== 'done' && phaseRef.current !== 'idle') {
          setPhase('idle');
          setStatusMsg('');
          setProgress(0);
        }
      }
    }, 800);
    return () => clearInterval(iv);
  }, [phase]);

  // ── Cleanup on unmount ────────────────────────────────────
  useEffect(() => {
    return () => {
      clearTimeout(timerRef.current);
      if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
    };
  }, []);

  const isLoading = ['popup_open','waiting','scraping'].includes(phase);

  const steps = [
    { icon: phase!=='idle'?'✅':'1️⃣', label:'Click Fetch',         done: phase!=='idle',    active: phase==='popup_open' },
    { icon: ['waiting','scraping','done'].includes(phase)?'✅':'2️⃣', label:'Login & Wait',  done: ['scraping','done'].includes(phase), active: phase==='waiting' },
    { icon: ['done'].includes(phase)?'✅':'3️⃣',                      label:'Auto Scrape',   done: phase==='done',    active: phase==='scraping' },
    { icon: '4️⃣',                                                     label:'Import Data',   done: false,             active: phase==='done' },
  ];

  return (
    <div className="cv-fetch-banner">
      <div className="cv-banner-inner">
        <div className="cv-banner-icon" style={{fontSize: isLoading ? '26px' : '30px'}}>
          {phase==='error' ? '❌' : phase==='done' ? '✅' : isLoading ? '⏳' : '🎓'}
        </div>
        <div className="cv-banner-text">
          <div className="cv-banner-title">
            {phase==='error' ? 'Something went wrong' :
             phase==='done'  ? 'Data fetched! 🎉' :
             'Fetch Attendance from CyberVidya'}
          </div>
          <div className="cv-banner-sub">
            {statusMsg || 'Works on mobile & desktop — no extension needed!'}
          </div>
          {!isLoading && phase === 'idle' && (
            <div className="cv-banner-steps">
              {[
                {n:'1',l:'Click Fetch'},{n:'2',l:'Login on CyberVidya'},
                {n:'3',l:'Auto Scrape'},{n:'4',l:'Import'}
              ].map(({n,l},i,a)=>(
                <React.Fragment key={n}>
                  <div className="cv-step"><span>{n}</span> {l}</div>
                  {i < a.length-1 && <span className="cv-step-arrow">→</span>}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>

        {/* CTA / Loading / Error button */}
        {phase === 'idle' && (
          <button className="cv-fetch-btn" onClick={handleFetch}>
            <span className="cv-fetch-btn-shine"/>
            <span style={{fontSize:'16px'}}>⚡</span>
            Fetch Attendance
          </button>
        )}
        {isLoading && (
          <div className="cv-fetching-state">
            <span className="cv-dot"/><span className="cv-dot"/><span className="cv-dot"/>
          </div>
        )}
        {phase === 'error' && (
          <button className="btn btn-ghost" style={{padding:'8px 16px',fontSize:'13px',flexShrink:0}}
            onClick={() => { setPhase('idle'); setStatusMsg(''); setProgress(0); }}>
            🔄 Retry
          </button>
        )}
      </div>

      {/* Progress bar */}
      {isLoading && (
        <div className="popscrape-progress" style={{marginTop:'14px',marginBottom:0}}>
          <div className="popscrape-progress-fill" style={{width:`${progress}%`}}/>
        </div>
      )}

      {/* Popup blocked warning */}
      {phase === 'idle' && (
        <div style={{marginTop:'10px',fontSize:'11px',color:'var(--text3)',lineHeight:1.5}}>
          💡 A popup window will open — please allow popups for this site if prompted.
          Works on mobile &amp; desktop without any extension.
        </div>
      )}
    </div>
  );
}

// ══ App ═══════════════════════════════════════════════════
function App() {
  const [user,setUser]           = useState(undefined);
  const [dark,setDark]           = useState(true);
  const [tab,setTab]             = useState('subjects');
  const [syncBanner, setSyncBanner] = useState(null);
  const [extInstalled, setExtInstalled] = useState(false);

  useEffect(()=>{
    const saved = localStorage.getItem('bpp_theme');
    if(saved) setDark(saved==='dark');
    if(firebaseReady) {
      const unsub = auth.onAuthStateChanged(u => setUser(u||null));
      return ()=>unsub();
    } else { setUser(null); }
  },[]);

  // Extension detection — checks both possible marker IDs, polls robustly
  useEffect(()=>{
    function isExtInstalled() {
      return !!(
        document.getElementById('bunkplanner-extension-installed') ||
        document.getElementById('bpp-ext-marker')
      );
    }
    if (isExtInstalled()) { setExtInstalled(true); return; }
    // Poll every 400ms for up to 20s (bridge may load after React)
    let count = 0;
    const iv = setInterval(() => {
      count++;
      if (isExtInstalled()) { setExtInstalled(true); clearInterval(iv); return; }
      if (count >= 50) clearInterval(iv); // stop after 20s
    }, 400);
    return () => clearInterval(iv);
  },[]);

  // Process sync payload (called from event OR localStorage)
  function processSyncPayload(detail) {
    console.log('[BunkPlanner] processSyncPayload — type:', detail.type,
      'subjects:', detail.subjects?.length ?? 'N/A');

    let subjects = [];

    // Normalize subjects array from any source
    function extractSubjects(arr) {
      if (!Array.isArray(arr) || arr.length === 0) return [];
      return arr.map(s => ({
        name:      (s.name || '').trim().slice(0, 80),
        attended:  parseInt(s.attended)  || 0,
        conducted: parseInt(s.conducted) || 0,
      })).filter(s => s.name && s.conducted > 0);
    }

    const t = (detail.type || '').toLowerCase();

    // type:'direct' or type:'scraped_v8' — subjects array provided directly
    if ((t === 'direct' || t === 'scraped_v8' || t === 'scraped_v9') && Array.isArray(detail.subjects)) {
      subjects = extractSubjects(detail.subjects);
    }
    // Fallback: subjects array present regardless of type
    else if (Array.isArray(detail.subjects) && detail.subjects.length > 0) {
      subjects = extractSubjects(detail.subjects);
    }
    // API JSON format
    else if (t === 'api' && detail.data) {
      subjects = parseCyberVidyaAPIData(detail.data);
    }
    // Raw scraped text (copy-paste format)
    else if ((t === 'scraped' || t === 'raw') && detail.data) {
      subjects = parseCyberVidyaData(detail.data);
    }

    if (subjects.length > 0) {
      console.log('[BunkPlanner] ✅ Showing SyncBanner for', subjects.length, 'subjects');
      setSyncBanner({ subjects });
      setTab('subjects');
      toast(`🎓 ${subjects.length} subjects fetched from CyberVidya!`, 'success');
    } else {
      console.warn('[BunkPlanner] processSyncPayload: no valid subjects parsed', detail);
      toast('Could not parse CyberVidya data 😅', 'error');
    }
  }

  // Guard: prevent double-processing same sync
  const syncProcessed = React.useRef(false);

  function safeProcessSync(parsed) {
    if (syncProcessed.current) { console.log('[BunkPlanner] Sync already processed, skipping'); return; }
    syncProcessed.current = true;
    processSyncPayload(parsed);
    // Reset after 10s to allow future syncs
    setTimeout(() => { syncProcessed.current = false; }, 10000);
  }

  // On mount: check localStorage for pending sync data (set by bridge/extension)
  useEffect(()=>{
    const pending = localStorage.getItem('bp_pending_sync');
    if (pending) {
      localStorage.removeItem('bp_pending_sync');
      try {
        const parsed = JSON.parse(pending);
        console.log('[BunkPlanner] Found pending sync in localStorage:', parsed.type, parsed.subjects?.length);
        setTimeout(() => safeProcessSync(parsed), 600);
      } catch(e) { console.error('[BunkPlanner] localStorage parse error:', e); }
    }
  // eslint-disable-next-line
  }, []);

  // Listen for CustomEvent (fired by bridge content script or direct injection)
  useEffect(()=>{
    function handleSync(e) {
      const detail = e.detail || {};
      console.log('[BunkPlanner] CustomEvent received:', detail.type, detail.subjects?.length);
      localStorage.removeItem('bp_pending_sync');
      safeProcessSync(detail);
    }
    window.addEventListener('bunkplanner-sync', handleSync);
    return ()=>window.removeEventListener('bunkplanner-sync', handleSync);
  // eslint-disable-next-line
  },[]);

  // POLLING FALLBACK: Check localStorage every 800ms for 12s after page load
  // This catches cases where the bridge writes AFTER React's mount useEffect
  useEffect(()=>{
    let attempts = 0;
    const maxAttempts = 15;
    const interval = setInterval(() => {
      attempts++;
      const pending = localStorage.getItem('bp_pending_sync');
      if (pending) {
        clearInterval(interval);
        localStorage.removeItem('bp_pending_sync');
        try {
          const parsed = JSON.parse(pending);
          console.log('[BunkPlanner] Polling found sync data:', parsed.type, parsed.subjects?.length);
          safeProcessSync(parsed);
        } catch(e) { console.error('[BunkPlanner] Polling parse error:', e); }
      }
      if (attempts >= maxAttempts) clearInterval(interval);
    }, 800);
    return () => clearInterval(interval);
  // eslint-disable-next-line
  },[]);

  useEffect(()=>{
    document.body.className = dark ? '' : 'light';
    localStorage.setItem('bpp_theme', dark?'dark':'light');
  },[dark]);

  async function logout() {
    await auth.signOut();
    setUser(null);
    toast('Logged out! See you 👋','info');
  }



  if(user===undefined) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:'20px'}}>
      <div style={{fontSize:'52px',animation:'float 2s ease infinite'}}>🎓</div>
      <div style={{fontFamily:'Syne,sans-serif',fontSize:'22px',fontWeight:800,color:'var(--accent2)'}}>BunkPlanner Pro</div>
      <div style={{display:'flex',gap:'8px'}}>
        {[0,1,2].map(i=>(
          <div key={i} className="skeleton" style={{width:'9px',height:'9px',borderRadius:'50%',animation:`pulse 1.2s ease ${i*.2}s infinite`}}/>
        ))}
      </div>
    </div>
  );

  if(!user) return <><AuthScreen onAuth={setUser}/><ToastContainer/></>;

  const displayName = user.displayName || (user.email&&user.email.split('@')[0]) || 'Student';
  const initials    = displayName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo">Bunk<span>Planner</span> Pro</div>
        <div className="nav-right">
          {extInstalled && (
            <div className="ext-active-pill">
              <span className="ext-pulse-dot"/>
              Extension Active
            </div>
          )}
          <div className="nav-user">
            <div className="nav-avatar">{initials}</div>
            <span style={{maxWidth:'110px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{displayName}</span>
          </div>
          <button className="theme-toggle" onClick={()=>setDark(p=>!p)}>{dark?'☀️':'🌙'}</button>
          <button className="btn btn-ghost" style={{padding:'7px 14px',fontSize:'13px'}} onClick={logout}>Logout</button>
        </div>
      </nav>
      {syncBanner && (
        <SyncBanner
          subjects={syncBanner.subjects}
          user={user}
          onDone={()=>setSyncBanner(null)}
          onCancel={()=>setSyncBanner(null)}
        />
      )}
      <main className="main">
        <div className="hero">
          <div className="hero-badge">👋 Welcome, {displayName}!</div>
          <h1 className="hero-title">Bunk Smarter,<br/>Not Harder</h1>
          <p className="hero-sub">Data syncs real-time across all devices.<br/>Add on laptop, view on phone! ☁️</p>
        </div>
        <AutoFetchBanner
          extInstalled={extInstalled}
          onDataReceived={(subs)=>{ setSyncBanner({subjects:subs}); setTab('subjects'); }}
        />
        <div className="tabs">
          <button className={`tab-btn ${tab==='subjects'?'active':''}`} onClick={()=>setTab('subjects')}>📚 My Subjects</button>
          <button className={`tab-btn ${tab==='calc'?'active':''}`} onClick={()=>setTab('calc')}>🧮 Calculator</button>
        </div>
        {tab==='subjects' && <Subjects user={user}/>}
        {tab==='calc'     && <Calculator/>}
      </main>
      <footer className="footer">Built with <span>❤️</span> for KIET students — bunk planning is a life skill 😎</footer>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
