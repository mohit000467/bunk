// ═══════════════════════════════════════════════════════
//  CYBERVIDYA SEMI-AUTO IMPORT — FULL COMPONENT
// ═══════════════════════════════════════════════════════

function parseCyberVidyaData(raw) {
  const results = [];
  if (!raw || !raw.trim()) return results;

  const lines = raw.split(/[\r\n]+/).map(l => l.trim()).filter(Boolean);
  const SKIP = /^(s\.?no\.?|course|component|variant|presents|special|lectures|attendance|%|course component|course variant|special attendance)$/i;
  const COMPONENT_RX = /^(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i;

  function cleanDots(str) {
    return str.replace(/\.+$/, ''); // ✅ FIX: only remove trailing dots safely
  }

  function getNameWithSuffix(nameStr, dataLine) {
    const compMatch = dataLine.match(/^(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
    const component = compMatch ? compMatch[1].toUpperCase() : '';

    let name = cleanName(
      cleanDots(
        nameStr.replace(/^\d+\s*/, '').trim()
      )
    );

    if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';
    return name;
  }

  // ── STRATEGY 1: Paired lines ─
  for (let i = 0; i < lines.length - 1; i++) {
    const nameLine = lines[i];
    const dataLine = lines[i + 1];

    if (!/%$/.test(dataLine)) continue;
    if (!COMPONENT_RX.test(dataLine)) continue;

    const nameStripped = cleanDots(
      nameLine.replace(/^\d+\s*/, '').trim()
    );

    if (!nameStripped || nameStripped.length < 3) continue;
    if (SKIP.test(nameStripped) || COMPONENT_RX.test(nameStripped)) continue;
    if (!/[A-Za-z]{3,}/.test(nameStripped)) continue;

    const nums = parseKIETNumbers(dataLine);
    if (!nums) continue;

    const attended = Math.min(nums.presents + nums.special, nums.lectures);
    const name = getNameWithSuffix(nameStripped, dataLine);

    results.push({ name, attended, conducted: nums.lectures });
    i++;
  }

  // ── STRATEGY 2: Single line ─
  if (results.length === 0) {
    for (const line of lines) {
      if (!/%$/.test(line)) continue;

      const compMatch = line.match(/(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
      if (!compMatch) continue;

      const compIdx = line.search(/(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);

      let namePart = cleanDots(
        line.slice(0, compIdx).replace(/^\d+/, '').trim()
      );

      if (!namePart || namePart.length < 3) continue;

      const component = compMatch[1].toUpperCase();
      const nums = parseKIETNumbers(line);
      if (!nums) continue;

      const attended = Math.min(nums.presents + nums.special, nums.lectures);

      let name = cleanName(namePart);
      if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';

      results.push({ name, attended, conducted: nums.lectures });
    }
  }

  // ── STRATEGY 3: fallback ─
  if (results.length === 0) {
    const flat = raw.replace(/[\r\n\t]+/g,' ').replace(/\s{2,}/g,' ');
    const rx = /(?:\d+\s+)?([A-Za-z][A-Za-z0-9&\-\s\.]{3,50}?)\s+(THEORY|PRACTICAL|BLENDED|LAB)\s+\S+\s+(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})\s+\d{1,3}%/gi;
    let m;
    while ((m = rx.exec(flat)) !== null) {
      const component = m[2].toUpperCase();
      let name = cleanName(cleanDots(m[1]));
      if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';

      const p = parseInt(m[3]), s = parseInt(m[4]), l = parseInt(m[5]);
      if (!name || l <= 0) continue;

      results.push({ name, attended: Math.min(p+s, l), conducted: l });
    }
  }

  // ── DEDUP ─
  const seen = new Set();
  return results.filter(s => {
    if (!s.name || s.name.length < 2) return false;
    const k = s.name.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

// Extract P, S, L, Pct from jammed number string at end of CyberVidya data line
// e.g. "...CS4C1642483%" -> P=16, S=4, L=24, pct=83
function parseKIETNumbers(dataLine) {
  let lastLetterIdx = -1;
  for (let i = dataLine.length - 1; i >= 0; i--) {
    if (/[A-Za-z]/.test(dataLine[i])) { lastLetterIdx = i; break; }
  }
  if (lastLetterIdx === -1) return null;

  const tail = dataLine.slice(lastLetterIdx + 1).replace(/[^\d]/g, '');
  if (tail.length < 3) return null;

  const candidates = [];
  for (let p1 = 1; p1 <= 3; p1++) {
    for (let p2 = 0; p2 <= 2; p2++) {
      for (let p3 = 1; p3 <= 3; p3++) {
        const p4 = tail.length - p1 - p2 - p3;
        if (p4 < 1 || p4 > 3) continue;
        const P   = parseInt(tail.slice(0, p1));
        const S   = p2 > 0 ? parseInt(tail.slice(p1, p1 + p2)) : 0;
        const L   = parseInt(tail.slice(p1 + p2, p1 + p2 + p3));
        const Pct = parseInt(tail.slice(p1 + p2 + p3));
        if (Pct < 0 || Pct > 100) continue;
        if (L < 1 || L > 200)     continue;
        if (P < 0 || P > 200)     continue;
        if (S < 0 || S > 100)     continue;
        if (P + S > L + 1)        continue;
        const calc = (P + S) / L * 100;
        const diff = Math.abs(Math.round(calc) - Pct);
        if (diff <= 1) candidates.push({ presents: P, special: S, lectures: L, score: diff * 1000 + L });
      }
    }
  }
  if (!candidates.length) return null;
  candidates.sort((a, b) => a.score - b.score);
  return candidates[0];
}
// Known KIET subject name expansions
// CyberVidya truncates long names in the DOM — we expand them here
const SUBJECT_EXPANSIONS = [
  // Pattern (lowercase prefix) → full name
  // ── Design and Analysis of Algorithms (CyberVidya shows "Al..." for "Algorithm") ──
  ['design and analysis of al', 'Design and Analysis of Algorithms'],
  ['design & analysis of al',   'Design and Analysis of Algorithms'],
  ['design and analysis of algorithm', 'Design and Analysis of Algorithms'],
  ['design & analysis of algorithm',   'Design and Analysis of Algorithms'],
  // ── Other subjects ──
  ['ann and machine learn',     'ANN and Machine Learning'],
  ['aws foundations',           'AWS Foundations & Data Engineering'],
  ['computer networks l',       'Computer Networks'],   // Lab handled by (Lab) suffix
  ['soft skills essential',     'Soft Skills Essential'],
  ['universal human val',       'Universal Human Values'],
  ['web technolog',             'Web Technology'],
  ['data analytic',             'Data Analytics'],
  ['computer network',          'Computer Networks'],
  ['aptitude',                  'Aptitude'],
];

function expandSubjectName(raw) {
  const lower = raw.toLowerCase().trim();
  for (const [prefix, full] of SUBJECT_EXPANSIONS) {
    if (lower.startsWith(prefix)) return full;
  }
  return raw; // no match — return as-is
}

// ── normalizeExtSubjectName ──────────────────────────────────────────────────
// Applied to subjects coming from the extension (auto-fetch / API path).
// Handles:  "Design and Analysis of Al..." → "Design and Analysis of Algorithms"
//           "Design and Analysis of Al... (Lab)" → "Design and Analysis of Algorithms (Lab)"
// Also strips trailing dots/ellipsis left by CyberVidya truncation.
function normalizeExtSubjectName(rawName) {
  if (!rawName) return rawName;
  // Preserve "(Lab)" or "(Practical)" suffix if present
  const labMatch = rawName.match(/\s*\((Lab|Practical|Tutorial)\)\s*$/i);
  const suffix   = labMatch ? ` (${labMatch[1]})` : '';
  let base = labMatch ? rawName.slice(0, labMatch.index) : rawName;

  // Strip trailing dots / ellipsis added by CyberVidya truncation
  base = base.replace(/\.+$/, '').trim();

  // Apply known expansions
  base = expandSubjectName(base);

  return (base + suffix).slice(0, 80);
}

function cleanName(s) {
  const cleaned = (s || '')
    .replace(/\.\.\./g, '')      // remove ellipsis
    .replace(/\s+/g, ' ')
    .replace(/[^\w\s\-&()\/]/g, '')
    .trim()
    .replace(/^[\d\s\.\-]+/, '') // strip leading numbers
    .trim()
    .slice(0, 80);                 // allow longer before expansion
  // Try to expand known truncated names
  return expandSubjectName(cleaned).slice(0, 80);
}

//  parseCyberVidyaAPIData  —  handles JSON from extension API
// ══════════════════════════════════════════════════════════════
function parseCyberVidyaAPIData(apiData) {
  const results = [];
  try {
    const arr = Array.isArray(apiData) ? apiData
      : apiData.data       ? (Array.isArray(apiData.data)       ? apiData.data       : [apiData.data])
      : apiData.attendance ? apiData.attendance
      : apiData.result     ? apiData.result : [];
    for (const item of arr) {
      const rawName  = (item.courseName||item.course_name||item.subject||item.subjectName||item.name||'').trim();
      const name     = normalizeExtSubjectName(rawName);
      const presents = parseInt(item.presents||item.attended||item.present||0);
      const special  = parseInt(item.specialAttendance||item.special||0);
      const lectures = parseInt(item.lectures||item.totalLectures||item.conducted||0);
      if (name && lectures > 0)
        results.push({ name, attended: Math.min(presents+special,lectures), conducted: lectures });
    }
  } catch(e) { console.warn('[BunkPlanner] API parse error:', e); }
  return results;
}

function SyncBanner({ subjects, user, onDone, onCancel }) {
  const [selected, setSelected] = useState(() => new Set(subjects.map((_,i) => i)));
  const [saving,   setSaving]   = useState(false);

  const [counts,   setCounts]   = useState(null);
  const [filter,   setFilter]   = useState('all'); // 'all' | 'safe' | 'risk' | 'danger'

  const TARGET = 75;

  const col = (firebaseReady && user)
    ? db.collection('users').doc(user.uid).collection('subjects')
    : null;

  /* helpers */
  const pctOf  = s => calcAtt(s.conducted, s.attended);
  const statOf = s => getStatus(pctOf(s), TARGET);

  function toggleSel(i) {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(i) ? n.delete(i) : n.add(i);
      return n;
    });
  }
  function selAll()  { setSelected(new Set(subjects.map((_,i) => i))); }
  function selNone() { setSelected(new Set()); }
  function selByStatus(st) {
    setSelected(new Set(subjects.map((_,i) => i).filter(i => statOf(subjects[i]) === st)));
  }

  /* Firebase save with dedup */
  async function handleImport() {
    if (!col)             { toast('Firebase not connected!', 'error'); return; }
    if (selected.size===0){ toast('Koi subject select nahi kiya!', 'error'); return; }
    setSaving(true);
    try {
      const toImport = subjects.filter((_,i) => selected.has(i));

      // Fetch existing subjects to dedup
      const snapshot = await col.get();
      const existingDocs = snapshot.docs;

      let added = 0, updated = 0;
      for (const s of toImport) {
        const nameKey = s.name.toLowerCase().trim();
        const match   = existingDocs.find(d => d.data().name.toLowerCase().trim() === nameKey);
        if (match) {
          // Update existing
          await col.doc(match.id).update({
            attended:    s.attended,
            conducted:   s.conducted,
            lastSynced:  firebase.firestore.FieldValue.serverTimestamp()
          });
          updated++;
        } else {
          // Add new
          await col.add({
            name:       s.name,
            attended:   s.attended,
            conducted:  s.conducted,
            createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
            lastSynced: firebase.firestore.FieldValue.serverTimestamp(),
            source:     'cybervidya-extension'
          });
          added++;
        }
      }

      setCounts({ added, updated });
      setDone(true);
      toast(`✅ ${added} added, ${updated} updated from CyberVidya!`, 'success');
      setTimeout(onDone, 3000);
    } catch(e) {
      console.error('[BunkPlanner] SyncBanner import error:', e);
      toast('Import failed: ' + e.message, 'error');
    }
    setSaving(false);
  }

  /* filtered view */
  const filtered = filter === 'all'
    ? subjects.map((_,i) => i)
    : subjects.map((_,i) => i).filter(i => statOf(subjects[i]) === filter);

  /* aggregate stats */
  const safeCount   = subjects.filter(s => statOf(s) === 'safe').length;
  const riskCount   = subjects.filter(s => statOf(s) === 'risk').length;
  const dangerCount = subjects.filter(s => statOf(s) === 'danger').length;

  return (
    <div className="ext-sync-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="ext-sync-card">

        {!done ? (
          <>
            {/* ── Header ── */}
            <div className="ext-sync-header">
              <div className="ext-sync-icon">🎓</div>
              <div>
                <div className="ext-sync-title">CyberVidya Sync!</div>
                <div className="ext-sync-sub">
                  {subjects.length} subjects fetched — select and import
                </div>
              </div>
              <button onClick={onCancel} style={{
                marginLeft:'auto', background:'none', border:'none',
                cursor:'pointer', fontSize:'20px', color:'var(--text2)', lineHeight:1, flexShrink:0
              }}>✕</button>
            </div>

            {/* ── Summary pills ── */}
            <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
              {[
                {label:`All (${subjects.length})`,  val:'all',    color:'var(--accent2)'},
                {label:`✅ Safe (${safeCount})`,    val:'safe',   color:'var(--green)'},
                {label:`⚠️ Risk (${riskCount})`,    val:'risk',   color:'var(--yellow)'},
                {label:`🚨 Low (${dangerCount})`,   val:'danger', color:'var(--red)'},
              ].map(p => (
                <button key={p.val} onClick={() => setFilter(p.val)} style={{
                  padding:'4px 11px', borderRadius:'100px', border:'none', cursor:'pointer',
                  fontSize:'11px', fontWeight:700, transition:'all .15s',
                  background: filter===p.val ? p.color : 'var(--surface2)',
                  color:       filter===p.val ? (p.val==='all'?'#fff':'#000') : 'var(--text2)',
                  opacity:     filter===p.val ? 1 : 0.7
                }}>{p.label}</button>
              ))}
            </div>

            {/* ── Select controls ── */}
            <div className="ext-sync-controls">
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:'11px'}} onClick={selAll}>Select All</button>
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:'11px'}} onClick={selNone}>Clear</button>
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:'11px'}} onClick={() => selByStatus('danger')}>Select Danger</button>
              <span className="ext-sync-count">{selected.size}/{subjects.length} selected</span>
            </div>

            {/* ── Subject rows ── */}
            <div className="ext-subj-list">
              {filtered.length === 0 && (
                <div style={{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'13px'}}>
                  No subjects in this category
                </div>
              )}
              {filtered.map(i => {
                const s   = subjects[i];
                const pct = pctOf(s);
                const st  = statOf(s);
                const col2 = sColor(st);
                const sel  = selected.has(i);
                return (
                  <div
                    key={i}
                    className={`ext-subj-row ${sel ? 'sel' : 'unsel'}`}
                    onClick={() => toggleSel(i)}
                  >
                    <div className={`ext-checkbox ${sel ? 'on' : 'off'}`}>{sel ? '✓' : ''}</div>
                    <div className="ext-subj-info">
                      <div className="ext-subj-name">{s.name}</div>
                      <div className="ext-subj-meta">{s.attended} attended / {s.conducted} total</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',flexShrink:0}}>
                      <div className="ext-subj-pct" style={{color:col2}}>{pct.toFixed(1)}%</div>
                      <span className="ext-subj-badge" style={{
                        background: st==='safe'?'var(--green-bg)':st==='risk'?'var(--yellow-bg)':'var(--red-bg)',
                        color: col2, border:`1px solid ${col2}33`
                      }}>{st.toUpperCase()}</span>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* ── Action buttons ── */}
            <div className="ext-footer-btns">
              <button className="btn btn-ghost" style={{flex:1}} onClick={onCancel}>Cancel</button>
              <button
                className="btn btn-primary"
                style={{flex:2}}
                onClick={handleImport}
                disabled={saving || selected.size === 0}
              >
                {saving
                  ? <><span style={{display:'inline-block',animation:'spin .7s linear infinite'}}>⏳</span> Saving...</>
                  : `☁️ Import ${selected.size} Subject${selected.size !== 1 ? 's' : ''} to Firebase`}
              </button>
            </div>
          </>
        ) : (
          /* ── Done state ── */
          <div className="ext-done-wrap">
            <div className="ext-done-icon">🎉</div>
            <div className="ext-done-title">Sync Complete!</div>
            <div className="ext-done-sub">
              {counts?.added   > 0 && <div>✅ <strong>{counts.added}</strong> new subject{counts.added!==1?'s':''} added</div>}
              {counts?.updated > 0 && <div>🔄 <strong>{counts.updated}</strong> subject{counts.updated!==1?'s':''} updated</div>}
              <div style={{marginTop:8,color:'var(--text3)',fontSize:'12px'}}>
                Data synced to Firebase ☁️ — visible on all devices!
              </div>
            </div>
            <button className="btn btn-primary" style={{marginTop:20,width:'100%'}} onClick={onDone}>
              ✅ Done!
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

//  AutoFetchBanner — One-click CyberVidya fetch card v11
// ══════════════════════════════════════════════════════════════
function AutoFetchBanner({ extInstalled: extProp, onDataReceived }) {
  // Own independent detection — checks BOTH marker IDs
  const [extInstalled, setExtInstalled] = useState(() =>
    !!(document.getElementById('bunkplanner-extension-installed') ||
       document.getElementById('bpp-ext-marker'))
  );
  // phase: 'idle' | 'opening' | 'scraping' | 'done' | 'error'
  const [phase, setPhase] = useState('idle');
  const [statusMsg, setStatusMsg] = useState('');
  const phaseRef = React.useRef('idle');

  function updatePhase(p) { phaseRef.current = p; setPhase(p); }

  // ── Poll for extension marker (document_start means it's injected early) ──
  useEffect(() => {
    function check() {
      return !!(
        document.getElementById('bunkplanner-extension-installed') ||
        document.getElementById('bpp-ext-marker')
      );
    }
    if (extProp || check()) { setExtInstalled(true); return; }
    let n = 0;
    const iv = setInterval(() => {
      n++;
      if (check()) { setExtInstalled(true); clearInterval(iv); return; }
      if (n >= 100) clearInterval(iv); // 40s max
    }, 400);
    return () => clearInterval(iv);
  }, [extProp]);

  useEffect(() => { if (extProp) setExtInstalled(true); }, [extProp]);

  // ── Listen for status updates from background via bridge ──
  useEffect(() => {
    function onStatus(e) {
      const { status, message, count } = e.detail || {};
      console.log('[AutoFetchBanner] status:', status, message);
      if (status === 'opening')  { updatePhase('opening');  setStatusMsg('Opening CyberVidya...'); }
      if (status === 'scraping') { updatePhase('scraping'); setStatusMsg('Scraping attendance data...'); }
      if (status === 'done')     { updatePhase('done');     setStatusMsg(`${count || ''} subjects ready!`); }
      if (status === 'error')    { updatePhase('error');    setStatusMsg(message || 'An error occurred. Please retry.'); }
    }
    window.addEventListener('bpp-autofetch-status', onStatus);
    return () => window.removeEventListener('bpp-autofetch-status', onStatus);
  }, []);

  // ── Listen for final data (CustomEvent from bridge/injection) ──
  useEffect(() => {
    function onSync(e) {
      if (!['opening','scraping','waiting','done'].includes(phaseRef.current)) return;
      const subs = ((e.detail || {}).subjects || [])
        .filter(s => s.name && s.conducted > 0)
        .map(s => ({ ...s, name: normalizeExtSubjectName(s.name) }));
      if (subs.length > 0) {
        updatePhase('idle');
        setStatusMsg('');
        onDataReceived(subs);
      }
    }
    window.addEventListener('bunkplanner-sync', onSync);
    return () => window.removeEventListener('bunkplanner-sync', onSync);
  }, [onDataReceived]);

  // ── Polling fallback for localStorage ──
  useEffect(() => {
    if (!['opening','scraping','waiting'].includes(phase)) return;
    let n = 0;
    const iv = setInterval(() => {
      n++;
      const raw = localStorage.getItem('bp_pending_sync');
      if (raw) {
        clearInterval(iv);
        localStorage.removeItem('bp_pending_sync');
        try {
          const parsed = JSON.parse(raw);
          const subs = (parsed.subjects || [])
            .filter(s => s.name && s.conducted > 0)
            .map(s => ({ ...s, name: normalizeExtSubjectName(s.name) }));
          if (subs.length > 0) { updatePhase('idle'); setStatusMsg(''); onDataReceived(subs); return; }
        } catch(e) {}
      }
      if (n >= 90) { updatePhase('error'); setStatusMsg('Timeout. Please login to CyberVidya and retry.'); clearInterval(iv); }
    }, 600);
    return () => clearInterval(iv);
  }, [phase]);

  function handleFetch() {
    if (!extInstalled) return;
    updatePhase('opening');
    setStatusMsg('Opening CyberVidya...');
    // Signal bridge.js → background.js → open CyberVidya tab & scrape
    window.dispatchEvent(new CustomEvent('bpp-open-cybervidya', { detail: { returnUrl: window.location.href } }));
  }

  const isLoading = ['opening','scraping','waiting'].includes(phase);

  const stepLabels = [
    { n:'1', l:'Click',     active: phase !== 'idle' },
    { n:'2', l:'CyberVidya',     active: phase === 'opening' || phase === 'scraping' },
    { n:'3', l:'Auto scrape',    active: phase === 'scraping' },
    { n:'4', l:'Import',    active: phase === 'done' },
  ];

  return (
    <div className="cv-fetch-banner">
      <div className="cv-banner-inner">
        <div className="cv-banner-icon" style={{fontSize: isLoading ? '28px' : '32px'}}>
          {isLoading ? '⏳' : phase === 'done' ? '✅' : phase === 'error' ? '❌' : '🎓'}
        </div>
        <div className="cv-banner-text">
          <div className="cv-banner-title">
            {phase === 'error' ? 'Something went wrong 😅' :
             phase === 'done'  ? 'Data is ready! 🎉' :
             'Fetch Attendance from CyberVidya'}
          </div>
          <div className="cv-banner-sub">
            {statusMsg || 'Auto-import all your subjects\' attendance in one click!'}
          </div>
          <div className="cv-banner-steps">
            {stepLabels.map(({n, l, active}, i, a) => (
              <React.Fragment key={n}>
                <div className="cv-step" style={{opacity: active ? 1 : 0.45, fontWeight: active ? 700 : 400}}>
                  <span>{n}</span> {l}
                </div>
                {i < a.length-1 && <span className="cv-step-arrow">→</span>}
              </React.Fragment>
            ))}
          </div>
        </div>

        {phase === 'idle' && (
          <button
            className="cv-fetch-btn"
            onClick={handleFetch}
            disabled={!extInstalled}
            title={!extInstalled ? 'Install the extension first' : 'Fetch attendance from CyberVidya'}
          >
            <span className="cv-fetch-btn-shine"/>
            <span style={{fontSize:'16px'}}>{extInstalled ? '⚡' : '🔌'}</span>
            {extInstalled ? 'Fetch Attendance' : 'Extension Needed'}
          </button>
        )}

        {isLoading && (
          <div className="cv-fetching-state">
            <span className="cv-dot"/><span className="cv-dot"/><span className="cv-dot"/>
          </div>
        )}

        {phase === 'error' && (
          <button className="btn btn-ghost" style={{padding:'8px 16px',fontSize:'13px',flexShrink:0}}
            onClick={() => { updatePhase('idle'); setStatusMsg(''); }}>
            🔄 Retry
          </button>
        )}
      </div>

      {phase === 'idle' && !extInstalled && (
        <div className="cv-no-ext">
          ⚠️ <strong>Extension not installed.</strong>{' '}
          Install <strong>extension_v11.zip</strong> from brave://extensions/ first — then reload the page.
        </div>
      )}
    </div>
  );
}

//  SMART ATTENDANCE DASHBOARD
//  Shows day-wise sessions + attendance status + prediction
//  Data: subjects (Firestore) + timetable (Firestore) + snapshots
// ═══════════════════════════════════════════════════════════════════

// ── Date/time helpers ────────────────────────────────────────────
function todayISO()    { return new Date().toISOString().slice(0,10); }
function dayOfWeek(d)  {
  const day = new Date(d + 'T00:00:00').getDay();
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][day];
}
function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function getWeekDates(offset = 0) {
  const now  = new Date();
  const diff = now.getDay() === 0 ? -6 : 1 - now.getDay();
  const mon  = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  return Array.from({length:5}, (_,i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    return d.toISOString().slice(0,10);
  });
}

// ── Snapshot comparison ──────────────────────────────────────────
function compareSnaps(prev, next) {
  // Returns { subjectName: 'present'|'absent'|'no-class' }
  const result = {};
  for (const [name, nd] of Object.entries(next)) {
    const pd = prev[name];
    if (!pd) continue; // first-time subject
    const dP = nd.present - pd.present;
    const dT = nd.total   - pd.total;
    if      (dP > 0)              result[name] = 'present';
    else if (dT > 0 && dP === 0)  result[name] = 'absent';
    else                          result[name] = 'no-class';
  }
  return result;
}

// ── SmartDashboard component ─────────────────────────────────────
function SmartDashboard({ user }) {
  const [subjects,   setSubjects]   = useState([]);
  const [timetable,  setTimetable]  = useState({});
  const [subjectMap, setSubjectMap] = useState({});
  const [snapshots,  setSnapshots]  = useState([]);
  const [attLogs,    setAttLogs]    = useState({});  // { "date_period_code": log }
  const [loading,    setLoading]    = useState(true);
  const [activeDate, setActiveDate] = useState(todayISO());
  const [weekOffset, setWeekOffset] = useState(0);

  const uid = user?.uid;
  const weekDates = getWeekDates(weekOffset);

  // Set default activeDate
  useEffect(() => {
    const today = todayISO();
    setActiveDate(weekDates.includes(today) ? today : weekDates[0]);
  }, [weekOffset]);

  // ── Load from Firestore ──────────────────────────────────────
  useEffect(() => {
    if (!uid || !db) { setLoading(false); return; }
    async function load() {
      try {
        // Timetable
        const ttDoc = await db.collection('users').doc(uid).collection('timetable').doc('data').get();
        if (ttDoc.exists) {
          const d = ttDoc.data();
          setTimetable(d.timetable || {});
          setSubjectMap(d.subjectMap || {});
        }
        // Subjects (for prediction)
        const sSnap = await db.collection('users').doc(uid).collection('subjects').get();
        setSubjects(sSnap.docs.map(d => ({id:d.id,...d.data()})));
        // Snapshots (last 10)
        const snapSnap = await db.collection('users').doc(uid)
          .collection('attendanceSnapshots').orderBy('date','desc').limit(10).get();
        setSnapshots(snapSnap.docs.map(d => ({id:d.id,...d.data()})));
      } catch(e) { console.error('[SmartDashboard] load error:', e); }
      setLoading(false);
    }
    load();
  }, [uid]);

  // ── Real-time: attendanceLogs listener ──────────────────────
  useEffect(() => {
    if (!uid || !db) return;
    const unsub = db.collection('users').doc(uid)
      .collection('attendanceLogs')
      .orderBy('date','desc').limit(200)
      .onSnapshot(snap => {
        const map = {};
        snap.docs.forEach(d => {
          const data = d.data();
          const key  = `${data.date}_${data.period}_${data.code}`;
          map[key]   = data;
        });
        setAttLogs(map);
      });
    return () => unsub();
  }, [uid]);

  // ── Run snapshot pipeline when extension syncs ───────────────
  // (called from processSyncPayload in App component via event)
  useEffect(() => {
    async function onExtSync(e) {
      const subjects_synced = e.detail?.subjects;
      if (!subjects_synced || !uid || !db) return;
      await runSmartSnapshotPipeline(uid, subjects_synced);
    }
    window.addEventListener('bpp-smart-sync', onExtSync);
    return () => window.removeEventListener('bpp-smart-sync', onExtSync);
  }, [uid]);

  if (loading) return (
    <div style={{textAlign:'center',padding:'60px 0',color:'var(--text3)'}}>
      <div style={{fontSize:'36px',animation:'spin 1s linear infinite',marginBottom:'12px'}}>⏳</div>
      <div>Loading Smart Dashboard...</div>
    </div>
  );

  // No timetable
  if (!Object.keys(timetable).length) return (
    <div className="glass sad-empty">
      <div className="sad-empty-icon">🗓️</div>
      <div className="sad-empty-title">No Timetable Found</div>
      <div className="sad-empty-sub">
        Upload your timetable in the <strong>Timetable</strong> tab first.<br/>
        Then fetch attendance with the extension to see daily sessions here.
      </div>
    </div>
  );

  // ── Build session data for active date ─────────────────────
  const dayName  = dayOfWeek(activeDate);
  const slots    = (timetable[dayName] || []).sort((a,b) => a.period - b.period);
  const sessions = slots.map(slot => {
    const code     = slot.subject;
    const fullName = subjectMap[code] || code;
    const logKey   = `${activeDate}_${slot.period}_${code}`;
    const log      = attLogs[logKey];
    const status   = log?.status || 'unknown';

    // Find subject in Firestore for prediction
    const subj = subjects.find(s => {
      const sn = (s.name||'').toLowerCase();
      return sn.includes(fullName.toLowerCase().slice(0,12)) ||
             sn.includes(code.toLowerCase().slice(0,6)) ||
             fullName.toLowerCase().includes(sn.slice(0,10));
    });

    return {
      period:   slot.period,
      time:     slot.time || PERIOD_TIMES[slot.period] || '',
      code, fullName, isLab: slot.isLab || code.endsWith('P'),
      status, subj,
      predSkip:   subj ? calcAtt(subj.conducted+1, subj.attended)          : null,
      predAttend: subj ? calcAtt(subj.conducted+1, subj.attended+1)        : null,
      currPct:    subj ? calcAtt(subj.conducted,   subj.attended)          : null,
    };
  });

  // Stats
  const present  = sessions.filter(s=>s.status==='present').length;
  const absent   = sessions.filter(s=>s.status==='absent').length;
  const noclass  = sessions.filter(s=>s.status==='no-class').length;
  const unknown  = sessions.filter(s=>s.status==='unknown').length;

  // Latest snapshot
  const latestSnap = snapshots[0];

  const statusIcon = s =>
    s==='present'?'✅': s==='absent'?'❌': s==='no-class'?'⚪': '❓';
  const statusLabel = s =>
    s==='present'?'Present': s==='absent'?'Absent': s==='no-class'?'No Class': 'Pending';

  return (
    <div>
      {/* ── Info banner ── */}
      <div className="sad-info-banner">
        <div className={`sad-snap-dot ${!snapshots.length?'none':''}`}/>
        {snapshots.length
          ? <span>Last sync: <strong style={{color:'var(--text)'}}>{latestSnap.date}</strong> · {snapshots.length} snapshots</span>
          : <span>⚠️ No snapshots yet. Fetch attendance via extension to start tracking.</span>
        }
        <span style={{marginLeft:'auto',fontSize:'11px',color:'var(--text3)'}}>
          Auto-updates when you fetch from CyberVidya
        </span>
      </div>

      {/* ── Week navigation ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px',flexWrap:'wrap',gap:'10px'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:'15px',fontWeight:700}}>
          📅 {fmtDate(weekDates[0])} – {fmtDate(weekDates[4])}
        </div>
        <div style={{display:'flex',gap:'6px'}}>
          {[['◀','prev'],['Today','today'],['▶','next']].map(([lbl,id])=>(
            <button key={id} onClick={()=>{
              if (id==='prev')  setWeekOffset(w=>w-1);
              if (id==='today') setWeekOffset(0);
              if (id==='next')  setWeekOffset(w=>w+1);
            }} style={{
              padding:'6px 10px',borderRadius:'8px',border:'1px solid var(--border)',
              background: id==='today'?'rgba(124,106,247,.12)':'var(--surface)',
              color: id==='today'?'var(--accent2)':'var(--text2)',
              cursor:'pointer',fontSize:'12px',fontWeight:700,
              borderColor: id==='today'?'rgba(124,106,247,.3)':'var(--border)',
            }}>{lbl}</button>
          ))}
        </div>
      </div>

      {/* ── Day tabs ── */}
      <div className="sad-day-tabs">
        {weekDates.map((date, i) => {
          const dn    = dayOfWeek(date);
          const dLogs = Object.values(attLogs).filter(l => l.date === date);
          const p     = dLogs.filter(l=>l.status==='present').length;
          const a     = dLogs.filter(l=>l.status==='absent').length;
          const isToday = date === todayISO();
          return (
            <button key={date} className={`sad-day-tab ${activeDate===date?'active':''}`}
              onClick={()=>setActiveDate(date)}>
              <div style={{fontWeight:700}}>{dn.slice(0,3)}</div>
              <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'2px'}}>{fmtDate(date)}{isToday?' ·T':''}</div>
              {(p>0||a>0) && (
                <div className="sad-day-pip">
                  {p>0 && <div className="sad-day-pip-dot" style={{background:'var(--green)'}} title={`${p} present`}/>}
                  {a>0 && <div className="sad-day-pip-dot" style={{background:'var(--red)'}}   title={`${a} absent`}/>}
                </div>
              )}
            </button>
          );
        })}
      </div>

      {/* ── Summary cards ── */}
      {sessions.length > 0 && (
        <div className="sad-summary">
          {[
            {val:sessions.length, lbl:'Scheduled',  col:'var(--accent2)'},
            {val:present,         lbl:'Present',     col:'var(--green)'},
            {val:absent,          lbl:'Absent',      col:'var(--red)'},
            {val:noclass,         lbl:'No Class',    col:'var(--text3)'},
            {val:unknown,         lbl:'Pending',     col:'var(--yellow)'},
          ].map((c,i) => (
            <div key={i} className="glass sad-sum-card">
              <div className="sad-sum-val" style={{color:c.col}}>{c.val}</div>
              <div className="sad-sum-lbl">{c.lbl}</div>
            </div>
          ))}
        </div>
      )}

      {/* ── Session list ── */}
      {sessions.length === 0 ? (
        <div className="glass sad-empty" style={{padding:'36px 24px'}}>
          <div className="sad-empty-icon" style={{fontSize:'36px'}}>😴</div>
          <div className="sad-empty-title" style={{fontSize:'16px'}}>No Classes</div>
          <div className="sad-empty-sub" style={{fontSize:'12px'}}>{dayName} has no scheduled periods.</div>
        </div>
      ) : (
        <div className="sad-subject-list">
          {sessions.map((s, i) => (
            <div key={i} className={`sad-subject-card ${s.status === 'no-class' ? 'noclass' : s.status}`}
              style={{animationDelay:`${i*.05}s`}}>
              {/* Period badge */}
              <div className="sad-period-badge">
                <div className="sad-period-num">
                  {['I','II','III','IV','V','VI','VII','VIII'][s.period-1] || s.period}
                </div>
                {s.isLab && <div className="sad-period-lab">LAB</div>}
              </div>

              {/* Subject info */}
              <div className="sad-subject-info">
                <div className="sad-subject-code">{s.code}</div>
                <div className="sad-subject-name">{s.fullName}</div>
                <div className="sad-subject-time">🕐 {s.time}</div>
                {/* Prediction */}
                {s.predSkip !== null && s.subj && (
                  <div className="sad-pred">
                    <span className="sad-pred-lbl">Skip:</span>
                    <span className="sad-pred-val"
                      style={{color: s.predSkip < 75 ? 'var(--red)' : 'var(--text)'}}>
                      {s.predSkip}%
                      {s.predSkip < 75 ? ' ⚠️' : ' ✅'}
                    </span>
                    <span className="sad-pred-sep">|</span>
                    <span className="sad-pred-lbl">Attend:</span>
                    <span className="sad-pred-val" style={{color:'var(--green)'}}>
                      {s.predAttend}% ✅
                    </span>
                    <span className="sad-pred-cur">Now: {s.currPct}%</span>
                  </div>
                )}
              </div>

              {/* Status + current % */}
              <div className="sad-status-wrap">
                <div className={`sad-status-badge ${s.status === 'no-class' ? 'noclass' : s.status}`}>
                  {statusIcon(s.status)} {statusLabel(s.status)}
                </div>
                {s.currPct !== null && (
                  <div className="sad-att-pct"
                    style={{color: s.currPct >= 75 ? 'var(--green)' : s.currPct >= 65 ? 'var(--yellow)' : 'var(--red)'}}>
                    {s.currPct}%
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── How it works ── */}
      <div style={{marginTop:'20px',padding:'13px 16px',borderRadius:'var(--radius-sm)',
        background:'rgba(124,106,247,.04)',border:'1px solid rgba(124,106,247,.1)',
        fontSize:'12px',color:'var(--text3)',lineHeight:'1.7'}}>
        <strong style={{color:'var(--accent2)'}}>💡 How it works:</strong> Fetch attendance via the
        <strong style={{color:'var(--text)'}}> BunkPlanner Smart extension</strong>. Every fetch compares with
        the previous snapshot — if your present count goes up → ✅ Present. If total goes up but present stays same → ❌ Absent.
      </div>
    </div>
  );
}

// ── Snapshot pipeline (called when extension syncs) ──────────────
async function runSmartSnapshotPipeline(uid, subjects) {
  if (!db || !uid || !subjects?.length) return;
  const date = todayISO();
  try {
    // Build new snapshot
    const newSnap = {};
    subjects.forEach(s => { newSnap[s.name] = { present: s.attended, total: s.conducted, date }; });

    // Load previous snapshot
    const snapDocs = await db.collection('users').doc(uid)
      .collection('attendanceSnapshots').orderBy('date','desc').limit(3).get();
    const prevDoc = snapDocs.docs.find(d => d.id !== date);
    const prevSnap = prevDoc?.data()?.snapshot || null;

    // Save new snapshot
    await db.collection('users').doc(uid)
      .collection('attendanceSnapshots').doc(date).set({
        snapshot: newSnap,
        date,
        capturedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

    if (!prevSnap) {
      toast('📸 Baseline saved! Fetch again to track daily attendance.','info');
      return;
    }

    // Compare
    const statusMap = compareSnaps(prevSnap, newSnap);

    // Load timetable to generate logs
    const ttDoc = await db.collection('users').doc(uid).collection('timetable').doc('data').get();
    const ttData = ttDoc.exists ? (ttDoc.data().timetable || {}) : {};
    const smData = ttDoc.exists ? (ttDoc.data().subjectMap  || {}) : {};

    const dayName = dayOfWeek(date);
    const slots   = (ttData[dayName] || []);
    if (slots.length === 0) return;

    // Match subjects to slots and write logs
    const batch = db.batch();
    let logCount = 0;

    for (const slot of slots) {
      const code     = slot.subject;
      const fullName = smData[code] || code;

      let status = 'unknown';
      for (const [name, st] of Object.entries(statusMap)) {
        const n = name.toLowerCase(), f = fullName.toLowerCase(), c = code.toLowerCase();
        if (n.includes(f.slice(0,10)) || f.includes(n.slice(0,10)) || n.includes(c) || c.includes(n.slice(0,6))) {
          status = st; break;
        }
      }

      const docId = `${date}_${slot.period}_${code}`;
      const ref   = db.collection('users').doc(uid).collection('attendanceLogs').doc(docId);
      batch.set(ref, {
        date, dayName, period: slot.period, time: slot.time||'',
        code, name: fullName, isLab: slot.isLab||false,
        status, updatedAt: new Date().toISOString()
      }, { merge: true });
      logCount++;
    }

    if (logCount > 0) await batch.commit();

    const p = Object.values(statusMap).filter(s=>s==='present').length;
    const a = Object.values(statusMap).filter(s=>s==='absent').length;
    if (p + a > 0) toast(`📅 ${p} present, ${a} absent detected today!`, 'success');

  } catch(e) {
    console.error('[SmartDashboard] Pipeline error:', e);
  }
}


function App() {
  const [user,setUser]           = useState(undefined);
  const [dark,setDark]           = useState(true);
  const [tab,setTab]             = useState('subjects');
  const [syncBanner, setSyncBanner] = useState(null);
  const [extInstalled, setExtInstalled] = useState(false);
  const [profileOpen,  setProfileOpen]  = useState(false);
  // null = not loaded yet, {} = loaded but empty (new user)
  const [profileData,  setProfileData]  = useState(null);
  const [profileLoading, setProfileLoading] = useState(false);

  // Close profile dropdown on outside click
  useEffect(()=>{
    if (!profileOpen) return;
    function onClickOutside(e) {
      if (!e.target.closest('.nav-avatar-btn') && !e.target.closest('.profile-dropdown')) {
        setProfileOpen(false);
      }
    }
    document.addEventListener('mousedown', onClickOutside);
    return () => document.removeEventListener('mousedown', onClickOutside);
  }, [profileOpen]);

  // Load this user's profile from Firestore (cloud — works across browsers/devices)
  async function loadProfileFromFirestore(u) {
    if (!u || !db) { setProfileData({}); return; }

    // ── KEY FIX: If a DIFFERENT user logged in, wipe all local stale data ──
    const lastUID = localStorage.getItem('bpp_last_uid');
    if (lastUID && lastUID !== u.uid) {
      // Different user — remove ALL bpp_ keys from localStorage
      const keysToRemove = Object.keys(localStorage).filter(k => k.startsWith('bpp_'));
      keysToRemove.forEach(k => localStorage.removeItem(k));
      console.log('[BPP] New user detected — cleared stale localStorage data');
    }
    // Track current user's UID
    localStorage.setItem('bpp_last_uid', u.uid);

    setProfileLoading(true);
    try {
      const doc = await db.collection('users').doc(u.uid).collection('profile').doc('data').get();
      if (doc.exists) {
        setProfileData(doc.data() || {});
      } else {
        // Brand new user — empty profile
        setProfileData({});
      }
    } catch(e) {
      console.error('Profile load error:', e);
      setProfileData({});
    }
    setProfileLoading(false);
  }

  useEffect(()=>{
    // One-time migration: remove old generic profile key from previous versions
    localStorage.removeItem('bpp_profile');

    const saved = localStorage.getItem('bpp_theme');
    if(saved) setDark(saved==='dark');
    if(firebaseReady) {
      const unsub = auth.onAuthStateChanged(u => {
        setUser(u||null);
        if (u) {
          // Always fetch fresh profile from Firestore for this specific user
          loadProfileFromFirestore(u);
        } else {
          // Logged out — wipe profile completely
          setProfileData(null);
        }
      });
      return ()=>unsub();
    } else { setUser(null); }
  },[]);

  // Extension detection — checks both possible marker IDs, polls robustly
  useEffect(()=>{
    function isExtInstalled() {
      return !!(
        document.getElementById('bunkplanner-extension-installed') ||
        document.getElementById('bpp-ext-marker')
      );
    }
    if (isExtInstalled()) { setExtInstalled(true); return; }
    // Poll every 400ms for up to 20s (bridge may load after React)
    let count = 0;
    const iv = setInterval(() => {
      count++;
      if (isExtInstalled()) { setExtInstalled(true); clearInterval(iv); return; }
      if (count >= 50) clearInterval(iv); // stop after 20s
    }, 400);
    return () => clearInterval(iv);
  },[]);

  // Process sync payload (called from event OR localStorage)
  function processSyncPayload(detail) {
    console.log('[BunkPlanner] processSyncPayload — type:', detail.type,
      'subjects:', detail.subjects?.length ?? 'N/A');

    let subjects = [];

    // Normalize subjects array from any source
    function extractSubjects(arr) {
      if (!Array.isArray(arr) || arr.length === 0) return [];
      return arr.map(s => {
        // Normalize known truncated names from CyberVidya (device-independent)
        const rawName  = (s.name || '').trim();
        const expanded = normalizeExtSubjectName(rawName);
        return {
          name:      expanded,
          attended:  parseInt(s.attended)  || 0,
          conducted: parseInt(s.conducted) || 0,
        };
      }).filter(s => s.name && s.conducted > 0);
    }

    const t = (detail.type || '').toLowerCase();

    // type:'direct' or type:'scraped_v8' — subjects array provided directly
    if ((t === 'direct' || t === 'scraped_v8' || t === 'scraped_v9') && Array.isArray(detail.subjects)) {
      subjects = extractSubjects(detail.subjects);
    }
    // Fallback: subjects array present regardless of type
    else if (Array.isArray(detail.subjects) && detail.subjects.length > 0) {
      subjects = extractSubjects(detail.subjects);
    }
    // API JSON format
    else if (t === 'api' && detail.data) {
      subjects = parseCyberVidyaAPIData(detail.data);
    }
    // Raw scraped text (copy-paste format)
    else if ((t === 'scraped' || t === 'raw') && detail.data) {
      subjects = parseCyberVidyaData(detail.data);
    }

    if (subjects.length > 0) {
      console.log('[BunkPlanner] ✅ Showing SyncBanner for', subjects.length, 'subjects');
      setSyncBanner({ subjects });
      setTab('subjects');
      toast(`🎓 ${subjects.length} subjects fetched from CyberVidya!`, 'success');
      // ── Fire Smart Dashboard pipeline ──────────────────────
      window.dispatchEvent(new CustomEvent('bpp-smart-sync', { detail: { subjects } }));
    } else {
      console.warn('[BunkPlanner] processSyncPayload: no valid subjects parsed', detail);
      toast('Could not parse CyberVidya data 😅', 'error');
    }
  }

  // ── Send Firebase token to extension (so it can write to Firestore) ──
  useEffect(() => {
    if (!user || typeof chrome === 'undefined' || !chrome.runtime?.id) return;
    user.getIdToken().then(token => {
      try {
        chrome.runtime.sendMessage({ action: 'setFirebaseToken', token, uid: user.uid });
      } catch(e) { /* extension not installed */ }
    }).catch(() => {});
  }, [user]);

  // Guard: prevent double-processing same sync
  const syncProcessed = React.useRef(false);

  function safeProcessSync(parsed) {
    if (syncProcessed.current) { console.log('[BunkPlanner] Sync already processed, skipping'); return; }
    syncProcessed.current = true;
    processSyncPayload(parsed);
    // Reset after 10s to allow future syncs
    setTimeout(() => { syncProcessed.current = false; }, 10000);
  }

  // On mount: check localStorage for pending sync data (set by bridge/extension)
  useEffect(()=>{
    const pending = localStorage.getItem('bp_pending_sync');
    if (pending) {
      localStorage.removeItem('bp_pending_sync');
      try {
        const parsed = JSON.parse(pending);
        console.log('[BunkPlanner] Found pending sync in localStorage:', parsed.type, parsed.subjects?.length);
        setTimeout(() => safeProcessSync(parsed), 600);
      } catch(e) { console.error('[BunkPlanner] localStorage parse error:', e); }
    }
  // eslint-disable-next-line
  }, []);

  // Listen for CustomEvent (fired by bridge content script or direct injection)
  useEffect(()=>{
    function handleSync(e) {
      const detail = e.detail || {};
      console.log('[BunkPlanner] CustomEvent received:', detail.type, detail.subjects?.length);
      localStorage.removeItem('bp_pending_sync');
      safeProcessSync(detail);
    }
    window.addEventListener('bunkplanner-sync', handleSync);
    return ()=>window.removeEventListener('bunkplanner-sync', handleSync);
  // eslint-disable-next-line
  },[]);

  // POLLING FALLBACK: Check localStorage every 800ms for 12s after page load
  // This catches cases where the bridge writes AFTER React's mount useEffect
  useEffect(()=>{
    let attempts = 0;
    const maxAttempts = 15;
    const interval = setInterval(() => {
      attempts++;
      const pending = localStorage.getItem('bp_pending_sync');
      if (pending) {
        clearInterval(interval);
        localStorage.removeItem('bp_pending_sync');
        try {
          const parsed = JSON.parse(pending);
          console.log('[BunkPlanner] Polling found sync data:', parsed.type, parsed.subjects?.length);
          safeProcessSync(parsed);
        } catch(e) { console.error('[BunkPlanner] Polling parse error:', e); }
      }
      if (attempts >= maxAttempts) clearInterval(interval);
    }, 800);
    return () => clearInterval(interval);
  // eslint-disable-next-line
  },[]);

  useEffect(()=>{
    document.body.className = dark ? '' : 'light';
    localStorage.setItem('bpp_theme', dark?'dark':'light');
  },[dark]);

  async function logout() {
    setProfileData(null);
    setProfileOpen(false);
    // Clear all bpp_ keys from localStorage on logout
    const keysToRemove = Object.keys(localStorage).filter(k => k.startsWith('bpp_') && k !== 'bpp_theme');
    keysToRemove.forEach(k => localStorage.removeItem(k));
    await auth.signOut();
    setUser(null);
    toast('Logged out! See you 👋','info');
  }



  if(user===undefined) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:'20px'}}>
      <div style={{fontSize:'52px',animation:'float 2s ease infinite'}}>🎓</div>
      <div style={{fontFamily:'Syne,sans-serif',fontSize:'22px',fontWeight:800,color:'var(--accent2)'}}>BunkPlanner Pro</div>
      <div style={{display:'flex',gap:'8px'}}>
        {[0,1,2].map(i=>(
          <div key={i} className="skeleton" style={{width:'9px',height:'9px',borderRadius:'50%',animation:`pulse 1.2s ease ${i*.2}s infinite`}}/>
        ))}
      </div>
    </div>
  );

  if(!user) return <><AuthScreen onAuth={setUser}/><ToastContainer/></>;

  const displayName = user.displayName || (user.email&&user.email.split('@')[0]) || 'Student';
  const initials    = displayName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo">Bunk<span>Planner</span> Pro</div>
        <div className="nav-right">
          <button className="theme-toggle" onClick={()=>setDark(p=>!p)}>{dark?'☀️':'🌙'}</button>
          <div style={{position:'relative'}}>
            <button
              className={`nav-avatar-btn ${profileOpen?'open':''}`}
              onClick={()=>setProfileOpen(p=>!p)}
            >
              <div className="nav-avatar" style={{background:`linear-gradient(135deg,${(profileData&&profileData.avatarColor)||'var(--accent)'},var(--accent2))`}}>
                {(profileData&&profileData.avatarEmoji) || initials}
              </div>
              <span className="nav-username">{(profileData&&profileData.displayName) || displayName}</span>
              <span className="nav-chevron">▾</span>
            </button>
            {profileOpen && (
              <ProfileDropdown
                user={user}
                displayName={displayName}
                initials={initials}
                profileData={profileData}
                setProfileData={setProfileData}
                onClose={()=>setProfileOpen(false)}
                onLogout={()=>{setProfileOpen(false);logout();}}
              />
            )}
          </div>
        </div>
      </nav>
      {syncBanner && (
        <SyncBanner
          subjects={syncBanner.subjects}
          user={user}
          onDone={()=>setSyncBanner(null)}
          onCancel={()=>setSyncBanner(null)}
        />
      )}
      <main className="main">
        <div className="hero">
          <div className="hero-badge">
            <span>👋</span> Welcome back, {(profileData && profileData.displayName) || displayName}!
          </div>
          <h1 className="hero-title">Bunk Smarter,<br/>Not Harder</h1>
          <p className="hero-sub">Data syncs real-time across all devices.<br/>Add on laptop, view on phone! ☁️</p>
          {profileData && (profileData.college || profileData.branch || profileData.year) && (
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',marginTop:'16px',flexWrap:'wrap'}}>
              {profileData && profileData.college && (
                <div style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'var(--text3)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'100px',padding:'4px 12px'}}>
                  🏫 <span style={{color:'var(--text2)',fontWeight:600}}>{profileData && profileData.college}</span>
                </div>
              )}
              {profileData && profileData.branch && (
                <div style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'var(--text3)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'100px',padding:'4px 12px'}}>
                  🎓 <span style={{color:'var(--text2)',fontWeight:600}}>{profileData.branch}{profileData.year ? ` · ${profileData.year} Year` : ''}</span>
                </div>
              )}
              {profileData && profileData.rollNo && (
                <div style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'var(--text3)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'100px',padding:'4px 12px'}}>
                  🪪 <span style={{color:'var(--text2)',fontWeight:600}}>{profileData.rollNo}</span>
                </div>
              )}
            </div>
          )}
        </div>
        <AutoFetchBanner
          onDataReceived={(subs)=>{ setSyncBanner({subjects:subs}); setTab('subjects'); }}
        />
        <div className="tabs">
          <button className={`tab-btn ${tab==='subjects'?'active':''}`} onClick={()=>setTab('subjects')}>📚 My Subjects</button>
          <button className={`tab-btn ${tab==='calc'?'active':''}`} onClick={()=>setTab('calc')}>🧮 Calculator</button>
          <button className={`tab-btn ${tab==='smart'?'active':''}`} onClick={()=>setTab('smart')}
            style={tab==='smart'?{}:{}}>
            🎯 Smart Dashboard
          </button>
        </div>
        {tab==='subjects' && <Subjects user={user}/>}
        {tab==='calc'     && <Calculator/>}
        {tab==='smart'    && <SmartDashboard user={user}/>}
      </main>
      <footer className="footer">Built with <span>❤️</span> for KIET students — bunk planning is a life skill 😎</footer>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
