<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bunk Planner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--bg2:#0e0e1a;--bg3:#141424;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--surface3:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.20);
  --text:#eeeef8;--text2:#8888aa;--text3:#4a4a68;
  --accent:#7c6af7;--accent2:#a78bfa;--accent3:#c4b5fd;
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;--pink:#f472b6;--cyan:#22d3ee;
  --green-bg:rgba(52,211,153,0.08);--yellow-bg:rgba(251,191,36,0.08);--red-bg:rgba(248,113,113,0.08);
  --radius:18px;--radius-sm:11px;--radius-xs:8px;
  --shadow-lg:0 24px 64px rgba(0,0,0,0.6);--shadow-md:0 8px 32px rgba(0,0,0,0.4);
  --glow-accent:0 0 40px rgba(124,106,247,0.25);
}
.light{
  --bg:#f4f4fc;--bg2:#eeeef8;--bg3:#fff;
  --surface:rgba(0,0,0,0.03);--surface2:rgba(0,0,0,0.055);--surface3:rgba(0,0,0,0.08);
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--border3:rgba(0,0,0,0.20);
  --text:#0e0e1a;--text2:#55556a;--text3:#aaaacc;
  --shadow-lg:0 24px 64px rgba(0,0,0,0.12);--shadow-md:0 8px 32px rgba(0,0,0,0.08);
  --glow-accent:0 0 40px rgba(124,106,247,0.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Keyframes ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes bounceIn{0%{opacity:0;transform:scale(0.82)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes ripple{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.6);opacity:0}}
@keyframes shine{0%{left:-100%}100%{left:220%}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(124,106,247,.3)}50%{box-shadow:0 0 40px rgba(124,106,247,.6)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes profileSlide{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── Skeleton ── */
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:var(--radius-sm)}

/* ── Glass ── */
.glass{background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(14px);border-radius:var(--radius);transition:border-color .2s,box-shadow .2s}
.glass:hover{border-color:var(--border2)}
.glass-lift{background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(14px);border-radius:var(--radius);transition:all .22s}
.glass-lift:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--shadow-md)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.btn:active{transform:scale(0.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(124,106,247,.3)}
.btn-primary:hover{box-shadow:0 6px 30px rgba(124,106,247,.55);transform:translateY(-2px)}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.4)}
.btn-full{width:100%;padding:13px}

/* ── Inputs ── */
.input-wrap{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.07em;text-transform:uppercase}
.input{width:100%;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;transition:border-color .2s,box-shadow .2s;outline:none}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,247,.12)}
.input::placeholder{color:var(--text3)}
.input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(248,113,113,.1)}
.input-hint{font-size:11px;color:var(--red);margin-top:3px}
.input-group{position:relative}.input-group .input{padding-right:44px}
.input-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--text3);transition:color .2s}
.input-eye:hover{color:var(--text2)}

/* ── Nav ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(7,7,14,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
.light .nav{background:rgba(244,244,252,.88)}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.3px}
.nav-logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-avatar-btn{display:flex;align-items:center;gap:9px;padding:5px 12px 5px 5px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;position:relative}
.nav-avatar-btn:hover{border-color:var(--border2);background:var(--surface2)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.nav-username{font-size:13px;font-weight:600;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.nav-avatar-btn.open .nav-chevron{transform:rotate(180deg)}
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);transform:rotate(20deg)}
.logout-btn{padding:7px 14px;font-size:13px}

/* ── Profile Dropdown ── */
.profile-dropdown{position:absolute;top:calc(100% + 10px);right:0;width:300px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:0;z-index:999;box-shadow:var(--shadow-lg);animation:profileSlide .2s ease;overflow:hidden}
.profile-header{background:linear-gradient(135deg,rgba(124,106,247,.2),rgba(167,139,250,.1));padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.profile-avatar-large{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(124,106,247,.4)}
.profile-name-big{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.profile-email-small{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.profile-body{padding:16px}
.profile-field{margin-bottom:12px}
.profile-field:last-child{margin-bottom:0}
.profile-field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.profile-field-value{font-size:13px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xs);padding:8px 11px;display:flex;align-items:center;gap:8px}
.profile-field-value.editable{cursor:pointer;transition:all .15s}
.profile-field-value.editable:hover{border-color:var(--accent);background:var(--surface2)}
.profile-input{width:100%;background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius-xs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:7px 10px;outline:none;transition:box-shadow .2s}
.profile-input:focus{box-shadow:0 0 0 3px rgba(124,106,247,.12)}
.profile-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.profile-save-btn{flex:1;padding:8px;font-size:12px;font-weight:700}
.profile-logout-btn{padding:8px 14px;font-size:12px}

/* ── Main layout ── */
.main{max-width:1100px;margin:0 auto;padding:36px 28px}
@media(max-width:600px){.main{padding:20px 16px}}

/* ── Auth ── */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 20% 50%,rgba(124,106,247,.12) 0%,transparent 65%)}
.auth-card{width:100%;max-width:420px;padding:40px 36px;animation:bounceIn .4s ease}
@media(max-width:480px){.auth-card{padding:26px 20px}}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{font-size:52px;display:block;margin-bottom:10px;animation:float 3s ease infinite}
.auth-logo-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}.auth-logo-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo-sub{font-size:13px;color:var(--text2);margin-top:5px}
.auth-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--bg3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.auth-stack{display:flex;flex-direction:column;gap:15px}

/* ── Hero ── */
.hero{text-align:center;padding:48px 0 36px;animation:fadeUp .5s ease;position:relative}
.hero::before{content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:400px;height:200px;background:radial-gradient(ellipse,rgba(124,106,247,.15),transparent 70%);pointer-events:none;filter:blur(20px)}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(124,106,247,.15),rgba(167,139,250,.1));border:1px solid rgba(124,106,247,.28);color:var(--accent2);font-size:12px;font-weight:700;padding:6px 16px;border-radius:100px;margin-bottom:20px;letter-spacing:.03em}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(30px,6vw,54px);font-weight:800;line-height:1.08;margin-bottom:14px;background:linear-gradient(135deg,var(--text) 20%,var(--accent2) 60%,var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:15px;color:var(--text2);max-width:440px;margin:0 auto;line-height:1.7}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px}
.tab-btn{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--bg3);color:var(--text);box-shadow:0 2px 10px rgba(0,0,0,.22)}
.tab-btn:hover:not(.active){color:var(--text)}

/* ── Calculator ── */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:700px){.calc-grid{grid-template-columns:1fr}}
.calc-card{padding:28px}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.inputs-stack{display:flex;flex-direction:column;gap:16px}
.circle-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
.result-box{padding:16px 18px;border-radius:var(--radius-sm);display:flex;align-items:flex-start;gap:12px;animation:bounceIn .4s ease}
.result-icon{font-size:26px;flex-shrink:0}
.result-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px}
.result-detail{font-size:13px;color:var(--text2);line-height:1.5}
.result-safe{background:var(--green-bg);border:1px solid rgba(52,211,153,.18);color:var(--green)}
.result-risk{background:var(--yellow-bg);border:1px solid rgba(251,191,36,.18);color:var(--yellow)}
.result-danger{background:var(--red-bg);border:1px solid rgba(248,113,113,.18);color:var(--red)}
.motivation{margin-top:14px;padding:13px 16px;background:linear-gradient(135deg,rgba(124,106,247,.08),rgba(167,139,250,.04));border:1px solid rgba(124,106,247,.18);border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--accent2);text-align:center}
.mini-bar-wrap{display:flex;flex-direction:column;gap:5px;width:100%}
.mini-bar-header{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);font-weight:500}
.mini-bar-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(0.34,1.56,0.64,1)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.04em}
.badge-safe{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.22)}
.badge-risk{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.22)}
.badge-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.22)}

/* ── Subjects ── */
.subjects-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.subject-card{padding:22px;position:relative;overflow:hidden;transition:all .22s}
.subject-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:var(--radius) var(--radius) 0 0}
.subject-card.safe::before{background:linear-gradient(90deg,var(--green),rgba(52,211,153,0))}
.subject-card.risk::before{background:linear-gradient(90deg,var(--yellow),rgba(251,191,36,0))}
.subject-card.danger::before{background:linear-gradient(90deg,var(--red),rgba(248,113,113,0))}
.subject-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border2)}
.subject-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.subject-actions{display:flex;gap:5px;flex-shrink:0}
.subject-actions button{width:28px;height:28px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;color:var(--text3)}
.subject-actions button:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.subject-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.subject-stat{text-align:center;padding:9px 6px;background:var(--surface);border-radius:var(--radius-xs);border:1px solid var(--border)}
.subject-stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.subject-stat-label{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.stats-row{display:grid;gap:14px;margin-bottom:22px}
.stat-card{padding:18px;text-align:center;animation:fadeUp .5s ease both;transition:all .22s}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-label{font-size:10px;color:var(--text2);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* ── Add form ── */
.add-form{padding:24px;animation:slideDown .3s ease}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.add-form-footer{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}

/* ── Empty state ── */
.empty-state{text-align:center;padding:64px 24px}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.45}
.empty-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.7}

/* ── Chart (Bar Chart Upgrade) ── */
.chart-wrap{padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.chart-wrap::before{content:'';position:absolute;top:0;right:0;width:180px;height:180px;background:radial-gradient(circle,rgba(124,106,247,.06),transparent 70%);pointer-events:none}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.chart-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.chart-legend{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text3)}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-weight:600}
.chart-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* Threshold slider */
.threshold-control{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px}
.threshold-label{font-size:11px;font-weight:700;color:var(--text2);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.threshold-value{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--accent2);min-width:36px;text-align:center}
.threshold-slider{-webkit-appearance:none;appearance:none;width:120px;height:4px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer}
.threshold-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;box-shadow:0 2px 8px rgba(124,106,247,.4);transition:transform .15s}
.threshold-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.threshold-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;border:none;box-shadow:0 2px 8px rgba(124,106,247,.4)}

/* Bar chart */
.bar-chart-area{position:relative;margin-top:8px}
.bar-chart-grid{position:relative;overflow:hidden}
.bar-chart-yaxis{position:absolute;left:0;top:0;bottom:32px;width:36px;display:flex;flex-direction:column;justify-content:space-between;padding-bottom:0}
.bar-chart-ylabel{font-size:9px;color:var(--text3);font-weight:600;text-align:right;padding-right:6px}
.bar-chart-inner{margin-left:40px;position:relative}
.bar-chart-lines{position:absolute;inset:0;bottom:32px;pointer-events:none}
.bar-chart-line{position:absolute;left:0;right:0;height:1px;background:var(--border)}
.bar-chart-threshold{position:absolute;left:0;right:0;height:2px;background:rgba(251,191,36,.6);border-top:2px dashed rgba(251,191,36,.7);z-index:2}
.bar-chart-threshold-label{position:absolute;right:0;top:-18px;font-size:10px;font-weight:700;color:var(--yellow);background:var(--bg2);padding:1px 6px;border-radius:4px;white-space:nowrap}

.bar-rect{width:78%;max-width:44px;border-radius:6px 6px 0 0;cursor:pointer;transform-origin:bottom;animation:barGrow .7s cubic-bezier(0.34,1.56,0.64,1) both;transition:filter .15s,width .15s;position:relative;overflow:hidden}

/* ── Sync dot ── */

/* ── Footer ── */

.ext-sync-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:500px;width:100%;animation:bounceIn .3s ease;max-height:88vh;overflow-y:auto}
.ext-sync-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.ext-sync-icon{font-size:36px;flex-shrink:0}

.ext-sync-sub{font-size:12px;color:var(--text2);margin-top:3px}
.ext-sync-controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}

.ext-checkbox{width:19px;height:19px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;transition:all .15s}

.ext-subj-info{flex:1;min-width:0}
.ext-subj-name{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ext-subj-meta{font-size:11px;color:var(--text2);margin-top:2px}
.ext-subj-pct{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;flex-shrink:0}
.ext-subj-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:100px;margin-top:3px;display:block;text-align:center}
.ext-footer-btns{display:flex;gap:10px;justify-content:flex-end}
.ext-done-wrap{text-align:center;padding:18px 0 8px}
.ext-done-icon{font-size:56px;margin-bottom:12px}
.ext-done-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--green);margin-bottom:6px}
.ext-done-sub{font-size:13px;color:var(--text2);line-height:1.6}
.ext-active-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--green);background:var(--green-bg);border:1px solid rgba(52,211,153,.2);padding:4px 10px;border-radius:100px;animation:fadeIn .4s ease}
.ext-pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:dotPulse 2s ease infinite}

/* ── AutoFetch Banner ── */
@keyframes ripple{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.6);opacity:0}}
@keyframes shine{0%{left:-100%}100%{left:220%}}
.cv-fetch-banner{position:relative;overflow:hidden;margin-bottom:24px;background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(52,211,153,.06),rgba(124,106,247,.1));background-size:200% 200%;animation:gradientShift 6s ease infinite,fadeUp .5s ease .1s both;border:1px solid rgba(124,106,247,.25);border-radius:var(--radius);padding:22px 26px}
.cv-banner-inner{display:flex;align-items:center;gap:18px;flex-wrap:wrap}

.cv-step-arrow{color:var(--text3);font-size:10px}
.cv-fetch-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(124,106,247,.38);transition:all .2s;white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden}
.cv-fetch-btn:hover{box-shadow:0 6px 28px rgba(124,106,247,.6);transform:translateY(-2px)}
.cv-fetch-btn:active{transform:scale(.97)}
.cv-fetch-btn-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);animation:shine 2.5s ease infinite}
.cv-no-ext{margin-top:10px;padding:10px 14px;border-radius:var(--radius-sm);background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);font-size:12px;color:var(--yellow);line-height:1.6}
.cv-fetching-state{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(124,106,247,.07);border:1px solid rgba(124,106,247,.18);border-radius:var(--radius-sm);font-size:12px;color:var(--accent2);font-weight:600;flex-shrink:0}
.cv-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent2);margin:0 2px;animation:dotPulse 1.2s ease infinite}
.cv-dot:nth-child(2){animation-delay:.2s}.cv-dot:nth-child(3){animation-delay:.4s}
.popscrape-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:18px}
.popscrape-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .6s ease}

/* ── Overall attendance card ── */
.overall-card{padding:28px;margin-bottom:24px;background:linear-gradient(135deg,rgba(124,106,247,.06),rgba(52,211,153,.03));position:relative;overflow:hidden}
.overall-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(124,106,247,.12),transparent 70%);pointer-events:none}

/* ── Bar Chart (New) ── */
@keyframes barGrow{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
.chart-wrap{padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.chart-wrap::before{content:'';position:absolute;top:0;right:0;width:180px;height:180px;background:radial-gradient(circle,rgba(124,106,247,.06),transparent 70%);pointer-events:none}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.chart-legend{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text3);flex-wrap:wrap}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-weight:600}
.chart-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.threshold-control{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;flex-shrink:0}
.threshold-label{font-size:11px;font-weight:700;color:var(--text2);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.threshold-value{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--accent2);min-width:34px;text-align:center}
.threshold-slider{-webkit-appearance:none;appearance:none;width:110px;height:4px;border-radius:2px;background:linear-gradient(to right,var(--accent) 0%,var(--accent2) 100%);outline:none;cursor:pointer}
.threshold-slider::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(124,106,247,.5);border:2px solid var(--accent);transition:transform .15s}
.threshold-slider::-webkit-slider-thumb:hover{transform:scale(1.25)}
.threshold-slider::-moz-range-thumb{width:17px;height:17px;border-radius:50%;background:#fff;cursor:pointer;border:2px solid var(--accent);box-shadow:0 2px 8px rgba(124,106,247,.5)}
.bar-chart-area{position:relative}
.bar-chart-inner{position:relative}
.bar-chart-grid-lines{position:absolute;left:40px;right:0;top:0;bottom:32px;pointer-events:none;z-index:0}
.bar-grid-line{position:absolute;left:0;right:0;height:1px;background:var(--border)}
.bar-threshold-line{position:absolute;left:0;right:0;height:0;border-top:2px dashed rgba(251,191,36,.75);z-index:2}
.bar-threshold-tag{position:absolute;right:4px;top:-16px;font-size:9px;font-weight:800;color:var(--yellow);background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);padding:1px 7px;border-radius:4px;white-space:nowrap}
.bar-chart-bars{display:flex;align-items:flex-end;gap:5px;height:200px;position:relative;z-index:1;padding-bottom:0;margin-left:40px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0;height:100%;position:relative;cursor:pointer}
.bar-rect-outer{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.bar-rect{width:72%;max-width:46px;min-height:4px;border-radius:6px 6px 0 0;transform-origin:bottom;animation:barGrow .65s cubic-bezier(0.34,1.56,0.64,1) both;transition:width .2s,filter .15s;position:relative;overflow:hidden}
.bar-rect::after{content:'';position:absolute;top:0;left:0;right:0;height:38%;background:linear-gradient(to bottom,rgba(255,255,255,.2),transparent);border-radius:6px 6px 0 0}
.bar-col:hover .bar-rect{width:88%;filter:brightness(1.2)}
.bar-pct-label{font-size:10px;font-weight:700;margin-bottom:4px;text-align:center;line-height:1}
.bar-name-label{font-size:9px;color:var(--text3);text-align:center;overflow:hidden;width:100%;padding:4px 2px 0;height:28px;display:flex;align-items:flex-start;justify-content:center;line-height:1.3;word-break:break-word}
.bar-y-axis{position:absolute;left:0;top:0;bottom:32px;width:36px;display:flex;flex-direction:column;justify-content:space-between}
.bar-y-label{font-size:9px;color:var(--text3);font-weight:600;text-align:right;padding-right:5px;line-height:1}
.bar-tooltip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;font-size:11px;white-space:nowrap;z-index:20;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:120px}
.bar-col:hover .bar-tooltip-box{opacity:1}

/* ── Nav upgrade ── */
.nav{background:rgba(7,7,14,.92);border-bottom:1px solid rgba(124,106,247,.12)}

.auth-page{background:

/* ── Overall card ── */
.overall-card{
  background:linear-gradient(135deg,rgba(124,106,247,.08) 0%,rgba(52,211,153,.04) 50%,rgba(124,106,247,.06) 100%);
  border:1px solid rgba(124,106,247,.18);

  position:relative;overflow:hidden;
}

.overall-card::after{content:'';position:absolute;bottom:-60px;left:-60px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(52,211,153,.07),transparent 65%);pointer-events:none}

.stat-card{
  background:var(--surface);

}

}

<script type="text/babel">
const { useState, useEffect } = React;

const calcAtt   = (c,a) => (!c||c===0)?0:Math.round((a/c)*1000)/10;
const getStatus = (p,t) => p>=t?'safe':p>=t-10?'risk':'danger';
const sColor    = s => s==='safe'?'var(--green)':s==='risk'?'var(--yellow)':'var(--red)';
const canBunk   = (c,a,t) => { const m=Math.floor((a*100/t)-c); return m>0?m:0; };
const needAtt   = (c,a,t) => { if(t>=100)return 999; const x=Math.ceil((t*c-100*a)/(100-t)); return x>0?x:0; };
const motivate  = (p,t,b) => {
  if(p===0) return '📚 Attend at least one class first...';
  if(p>=t+20) return '😎 You\'re safe! You can skip '+b+' more classes!';
  if(p>=t+10) return '🎯 Solid! You have some room to skip — chill!';
  if(p>=t)    return '✅ On target. Don\'t skip even one more!';
  if(p>=t-10) return '⚠️ Risky! Attend classes or you\'ll be short!';
  if(p>=t-20) return '😬 Danger! Attend classes or you\'ll be short 💀';
  return '🚨 SOS! Improve attendance — you may miss exams!';
};

let _tid=0, _add=null;
const toast = (msg, type='info') => _add && _add({id:++_tid, msg, type});

function ToastContainer() {
  const [list, set] = useState([]);
  _add = t => { set(p=>[...p,t]); setTimeout(()=>set(p=>p.filter(x=>x.id!==t.id)), 3200); };
  return (
    <div className="toast-container">
      {list.map(t=>(
        <div key={t.id} className={`toast toast-${t.type}`}>
          {t.type==='success'?'✅':t.type==='error'?'❌':'💡'} {t.msg}
        </div>
      ))}
    </div>
  );
}

function Ring({pct, target, size=180, sw=10}) {
  const r=(size-sw*2)/2, circ=2*Math.PI*r, color=sColor(getStatus(pct,target));
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg style={{transform:'rotate(-90deg)'}} width={size} height={size}>
        <circle fill="none" stroke="var(--border)" strokeWidth={sw} cx={size/2} cy={size/2} r={r}/>
        <circle fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round"
          cx={size/2} cy={size/2} r={r} strokeDasharray={circ}
          strokeDashoffset={circ-(Math.min(pct,100)/100)*circ}
          style={{transition:'stroke-dashoffset .8s cubic-bezier(0.34,1.56,0.64,1),stroke .4s'}}/>
      </svg>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:size===180?'32px':'15px',fontWeight:800,color,lineHeight:1}}>
          {pct.toFixed(size===180?1:0)}%
        </div>
        {size===180 && <div style={{fontSize:'11px',color:'var(--text2)',marginTop:3}}>attendance</div>}
      </div>
    </div>
  );
}

function MiniBar({pct, target}) {
  const color = sColor(getStatus(pct,target));
  return (
    <div className="mini-bar-wrap">
      <div className="mini-bar-header"><span>0%</span><span style={{color}}>● {pct.toFixed(1)}%</span><span>100%</span></div>
      <div className="mini-bar-track">
        <div className="mini-bar-fill" style={{width:`${Math.min(pct,100)}%`,background:color}}/>
      </div>
      <div className="mini-bar-header"><span/><span style={{color:'var(--text3)',fontSize:'10px'}}>Target: {target}%</span><span/></div>
    </div>
  );
}

function AuthScreen({onAuth}) {
  const [mode,setMode]       = useState('login');
  const [name,setName]       = useState('');
  const [email,setEmail]     = useState('');
  const [pass,setPass]       = useState('');
  const [showPw,setShowPw]   = useState(false);
  const [loading,setLoading] = useState(false);
  const [errors,setErrors]   = useState({});
  const [resetSent,setResetSent] = useState(false);

  function validate() {
    const e={};
    if(mode==='signup' && !name.trim()) e.name='Name required';
    if(!email.trim()) e.email='Email required';
    else if(!/\S+@\S+\.\S+/.test(email)) e.email='Invalid email';
    if(mode!=='forgot' && (!pass || pass.length<6)) e.pass='Min 6 characters';
    return e;
  }

  async function submit() {
    const e=validate(); setErrors(e);
    if(Object.keys(e).length) return;
    setLoading(true);
    try {
      if(mode==='forgot') {
        await auth.sendPasswordResetEmail(email.trim());
        setResetSent(true);
      } else if(mode==='login') {
        const c = await auth.signInWithEmailAndPassword(email.trim(), pass);
        toast('Welcome back! 👋','success');
        onAuth(c.user);
      } else {
        const c = await auth.createUserWithEmailAndPassword(email.trim(), pass);
        await c.user.updateProfile({displayName: name.trim()});
        toast(`Welcome ${name}! 🎉`,'success');
        onAuth(c.user);
      }
    } catch(err) {
      const m = err.code==='auth/user-not-found'       ? 'No account found with this email' :
                err.code==='auth/wrong-password'       ? 'Wrong password 🙈' :
                err.code==='auth/email-already-in-use' ? 'Email already registered' :
                err.code==='auth/too-many-requests'    ? 'Too many attempts. Please wait!' :
                err.code==='auth/invalid-email'        ? 'Invalid email format' :
                err.message;
      toast(m,'error');
    }
    setLoading(false);
  }

  function switchMode(m) { setMode(m); setErrors({}); setResetSent(false); }

  return (
    <div className="auth-page">
      <div className="glass auth-card">
        <div className="auth-logo">
          <span className="auth-logo-icon">🎓</span>
          <div className="auth-logo-title">Bunk<span>Planner</span> Pro</div>
          <div className="auth-logo-sub">Bunk smarter, not harder 😎</div>
        </div>

        {/* ── FORGOT PASSWORD VIEW ── */}
        {mode==='forgot' ? (
          <div className="auth-stack">
            {resetSent ? (
              <div style={{textAlign:'center',padding:'10px 0'}}>
                <div style={{fontSize:'48px',marginBottom:'12px'}}>📧</div>
                <div style={{fontFamily:'Syne,sans-serif',fontSize:'18px',fontWeight:800,color:'var(--green)',marginBottom:'8px'}}>
                  Email Sent!
                </div>
                <div style={{fontSize:'13px',color:'var(--text2)',lineHeight:'1.7',marginBottom:'20px'}}>
                  A password reset link has been sent to <strong style={{color:'var(--text)'}}>{email}</strong>.<br/>
                  Check your inbox (including Spam 😄)
                </div>
                <button className="btn btn-primary btn-full" onClick={()=>switchMode('login')}>
                  🔑 Back to Login
                </button>
              </div>
            ) : (
              <>
                <div style={{textAlign:'center',marginBottom:'16px'}}>
                  <div style={{fontSize:'36px',marginBottom:'8px'}}>🔐</div>
                  <div style={{fontFamily:'Syne,sans-serif',fontSize:'16px',fontWeight:700,color:'var(--text)'}}>Password Reset</div>
                  <div style={{fontSize:'12px',color:'var(--text2)',marginTop:'4px'}}>Enter your email — we'll send a reset link</div>
                </div>
                <div className="input-wrap">
                  <label className="input-label">Registered Email</label>
                  <input className={`input ${errors.email?'error':''}`} type="email" placeholder="you@email.com"
                    value={email} onChange={e=>{setEmail(e.target.value);setErrors(p=>({...p,email:''}))}}
                    onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
                  {errors.email && <span className="input-hint">{errors.email}</span>}
                </div>
                <button className="btn btn-primary btn-full" onClick={submit} disabled={loading}>
                  {loading ? '⏳ Sending...' : '📧 Send Reset Link'}
                </button>
                <button onClick={()=>switchMode('login')}
                  style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:'12px',marginTop:'8px',width:'100%'}}>
                  ← Back to Login
                </button>
              </>
            )}
          </div>
        ) : (
          <>
            <div className="auth-tabs">
              <button className={`auth-tab ${mode==='login'?'active':''}`} onClick={()=>switchMode('login')}>🔑 Login</button>
              <button className={`auth-tab ${mode==='signup'?'active':''}`} onClick={()=>switchMode('signup')}>✨ Sign Up</button>
            </div>
            <div className="auth-stack">
              {mode==='signup' && (
                <div className="input-wrap">
                  <label className="input-label">Your Name</label>
                  <input className={`input ${errors.name?'error':''}`} placeholder="e.g. Mohit Sharma"
                    value={name} onChange={e=>{setName(e.target.value);setErrors(p=>({...p,name:''}))}}
                    onKeyDown={e=>e.key==='Enter'&&submit()}/>
                  {errors.name && <span className="input-hint">{errors.name}</span>}
                </div>
              )}
              <div className="input-wrap">
                <label className="input-label">Email</label>
                <input className={`input ${errors.email?'error':''}`} type="email" placeholder="you@email.com"
                  value={email} onChange={e=>{setEmail(e.target.value);setErrors(p=>({...p,email:''}))}}
                  onKeyDown={e=>e.key==='Enter'&&submit()}/>
                {errors.email && <span className="input-hint">{errors.email}</span>}
              </div>
              <div className="input-wrap">
                <label className="input-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  Password
                  {mode==='login' && (
                    <button onClick={()=>switchMode('forgot')}
                      style={{background:'none',border:'none',color:'var(--accent2)',fontSize:'11px',fontWeight:600,cursor:'pointer',padding:0}}>
                      Forgot Password?
                    </button>
                  )}
                </label>
                <div className="input-group">
                  <input className={`input ${errors.pass?'error':''}`} type={showPw?'text':'password'} placeholder="Min 6 characters"
                    value={pass} onChange={e=>{setPass(e.target.value);setErrors(p=>({...p,pass:''}))}}
                    onKeyDown={e=>e.key==='Enter'&&submit()}/>
                  <button className="input-eye" onClick={()=>setShowPw(p=>!p)} type="button">{showPw?'🙈':'👁️'}</button>
                </div>
                {errors.pass && <span className="input-hint">{errors.pass}</span>}
              </div>
              <button className="btn btn-primary btn-full" onClick={submit} disabled={loading}>
                {loading ? '⏳ Please wait...' : mode==='login' ? '🚀 Login' : '✨ Create Account'}
              </button>
            </div>
            <div style={{textAlign:'center',marginTop:'20px',fontSize:'12px',color:'var(--text3)'}}>
              {mode==='login' ? "Don't have an account? " : 'Already registered? '}
              <button onClick={()=>switchMode(mode==='login'?'signup':'login')}
                style={{background:'none',border:'none',color:'var(--accent2)',fontWeight:700,cursor:'pointer',fontSize:'12px'}}>
                {mode==='login' ? 'Sign Up Free' : 'Login'}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function Calculator() {
  const [c,setC]=useState(''), [a,setA]=useState(''), [t,setT]=useState('75');
  const [errors,setErrors]=useState({}), [result,setResult]=useState(null), [loading,setLoading]=useState(false);

  function validate() {
    const e={};
    if(!c||isNaN(c)||+c<0) e.c='Enter a valid number';
    if(!a||isNaN(a)||+a<0) e.a='Enter a valid number';
    if(!t||isNaN(t)||+t<1||+t>100) e.t='1-100 only';
    if(!e.c&&!e.a&&+a>+c) e.a='Cannot exceed total';
    return e;
  }

  function calculate() {
    const e=validate(); setErrors(e);
    if(Object.keys(e).length) return;
    setLoading(true);
    setTimeout(()=>{
      const pct=calcAtt(+c,+a), tgt=+t;
      setResult({pct, status:getStatus(pct,tgt), bunk:canBunk(+c,+a,tgt), need:needAtt(+c,+a,tgt), target:tgt});
      setLoading(false);
    }, 500);
  }

  const r=result;
  return (
    <div className="calc-grid">
      <div className="glass calc-card" style={{animation:'fadeUp .4s ease'}}>
        <div className="section-title">🧮 Calculator</div>
        <div className="inputs-stack">
          <div className="input-wrap">
            <label className="input-label">Total Classes Conducted</label>
            <input className={`input ${errors.c?'error':''}`} type="number" min="0" placeholder="e.g. 40"
              value={c} onChange={e=>{setC(e.target.value);setErrors(p=>({...p,c:''}))}}/>
            {errors.c && <span className="input-hint">{errors.c}</span>}
          </div>
          <div className="input-wrap">
            <label className="input-label">Classes Attended</label>
            <input className={`input ${errors.a?'error':''}`} type="number" min="0" placeholder="e.g. 30"
              value={a} onChange={e=>{setA(e.target.value);setErrors(p=>({...p,a:''}))}}/>
            {errors.a && <span className="input-hint">{errors.a}</span>}
          </div>
          <div className="input-wrap">
            <label className="input-label">Target Attendance %</label>
            <input className={`input ${errors.t?'error':''}`} type="number" min="1" max="100" placeholder="75"
              value={t} onChange={e=>{setT(e.target.value);setErrors(p=>({...p,t:''}))}}/>
            {errors.t && <span className="input-hint">{errors.t}</span>}
          </div>
          <button className="btn btn-primary btn-full" onClick={calculate}>
            {loading ? '⏳ Calculating...' : '⚡ Calculate'}
          </button>
        </div>
      </div>
      <div className="glass calc-card" style={{animation:'fadeUp .4s ease .1s both'}}>
        <div className="section-title">📊 Analysis</div>
        {loading && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'14px',paddingTop:'10px'}}>
            <div className="skeleton" style={{width:'130px',height:'130px',borderRadius:'50%'}}/>
            <div className="skeleton" style={{width:'85%',height:'14px'}}/>
          </div>
        )}
        {!loading && !r && (
          <div style={{textAlign:'center',padding:'36px 0',color:'var(--text3)'}}>
            <div style={{fontSize:'48px',marginBottom:'14px',opacity:.4}}>📐</div>
            <div style={{fontSize:'13px'}}>Enter values and hit Calculate</div>
          </div>
        )}
        {!loading && r && (
          <div className="circle-wrap">
            <Ring pct={r.pct} target={r.target}/>
            <MiniBar pct={r.pct} target={r.target}/>
            <div className={`result-box result-${r.status}`} style={{width:'100%'}}>
              <div className="result-icon">{r.pct>=r.target?'😎':r.status==='risk'?'⚠️':'🚨'}</div>
              <div>
                <div className="result-title">{r.pct>=r.target?"You're Safe!":r.status==='risk'?'Risky Zone!':'Danger Zone!'}</div>
                <div className="result-detail">
                  {r.pct>=r.target
                    ? `Bunk ${r.bunk} more class${r.bunk!==1?'es':''} safely`
                    : `Attend ${r.need} class${r.need!==1?'es':''} to reach ${r.target}%`}
                </div>
              </div>
            </div>
            <div className="motivation" style={{width:'100%'}}>{motivate(r.pct,r.target,r.bunk)}</div>
          </div>
        )}
      </div>
    </div>
  );
}

function SubjectCard({subject, onEdit, onDelete, target}) {
  const pct=calcAtt(subject.conducted,subject.attended), st=getStatus(pct,target), color=sColor(st);
  return (
    <div className={`glass subject-card ${st}`} style={{animation:'bounceIn .35s ease'}}>
      <div className="subject-name">
        <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:'8px'}}>{subject.name}</span>
        <div className="subject-actions">
          <button onClick={()=>onEdit(subject)}>✏️</button>

      </div>
      <div className="subject-stats">
        <div className="subject-stat"><div className="subject-stat-val" style={{color}}>{pct.toFixed(1)}%</div><div className="subject-stat-label">Attendance</div></div>
        <div className="subject-stat"><div className="subject-stat-val">{subject.attended}</div><div className="subject-stat-label">Attended</div></div>
        <div className="subject-stat"><div className="subject-stat-val">{subject.conducted}</div><div className="subject-stat-label">Total</div></div>
      </div>
      <MiniBar pct={pct} target={target}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'12px'}}>

        <span style={{fontSize:'12px',color:'var(--text2)'}}>
          {pct>=target ? `🎉 Bunk ${canBunk(subject.conducted,subject.attended,target)}` : `📚 Need ${needAtt(subject.conducted,subject.attended,target)}`}
        </span>
      </div>
    </div>
  );
}

function Subjects({user}) {
  const [subjects,setSubjects] = useState([]);
  const [syncing,setSyncing]   = useState(true);
  const [threshold, setThreshold] = useState(() => {
    const saved = localStorage.getItem('bpp_threshold');
    return saved ? parseInt(saved) : 75;
  });
  const TARGET = threshold;
  const [showAdd,setShowAdd]   = useState(false);
  const [editModal,setEdit]    = useState(null);
  const [form,setForm]         = useState({name:'',conducted:'',attended:''});
  const [fErr,setFErr]         = useState({});

  const col = (firebaseReady && user)
    ? db.collection('users').doc(user.uid).collection('subjects')
    : null;

  const [clearConfirm, setClearConfirm] = useState(false);

  async function clearAllSubjects() {
    if (!col) { toast('Firebase not ready!', 'error'); return; }
    setClearConfirm(false);
    try {
      const snap = await col.get();
      if (snap.empty) { toast('No subjects found!', 'error'); return; }
      const count = snap.size;
      await Promise.all(snap.docs.map(d => d.ref.delete()));
      toast('🗑️ All ' + count + ' subjects deleted!', 'error');
    } catch(e) {
      toast('Delete failed: ' + e.message, 'error');
    }
  }

  useEffect(()=>{
    if(!col){ setSyncing(false); return; }
    setSyncing(true);
    const unsub = col.orderBy('createdAt','asc').onSnapshot(
      snap => { setSubjects(snap.docs.map(d=>({id:d.id,...d.data()}))); setSyncing(false); },
      err  => { console.error(err); setSyncing(false); toast('Sync error!','error'); }
    );
    return ()=>unsub();
  }, [user && user.uid]);

  function vf(f) {
    const e={};
    if(!f.name.trim()) e.name='Name required';
    if(!f.conducted||isNaN(f.conducted)||+f.conducted<0) e.conducted='Invalid';
    if(!f.attended||isNaN(f.attended)||+f.attended<0)    e.attended='Invalid';
    if(!e.conducted&&!e.attended&&+f.attended>+f.conducted) e.attended='Too many';
    return e;
  }

  async function handleAdd() {
    const e=vf(form); setFErr(e);
    if(Object.keys(e).length) return;
    await col.add({
      name:form.name.trim(), conducted:+form.conducted, attended:+form.attended,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast(`${form.name} added! 🎓`,'success');
    setForm({name:'',conducted:'',attended:''}); setShowAdd(false);
  }

  async function handleEditSave() {
    const e=vf(editModal); setFErr(e);
    if(Object.keys(e).length) return;
    await col.doc(editModal.id).update({
      name:editModal.name.trim(), conducted:+editModal.conducted, attended:+editModal.attended
    });
    setEdit(null); toast('Updated! ✅','success');
  }

  async function handleDelete(id) {
    const s=subjects.find(x=>x.id===id);
    await col.doc(id).delete();
    toast(`${s?.name} removed 🗑️`,'error');
  }

  const totC=subjects.reduce((s,x)=>s+x.conducted,0);
  const totA=subjects.reduce((s,x)=>s+x.attended,0);
  const oPct=calcAtt(totC,totA), oSt=getStatus(oPct,TARGET), oCol=sColor(oSt);
  const oBnk=canBunk(totC,totA,TARGET), oNd=needAtt(totC,totA,TARGET);

function parseCyberVidyaData(raw) {
  /*
    KIET CyberVidya copy-paste format — supports:

    FORMAT A (paired lines):
      Line1: "1ANN and Machine Learning"
      Line2: "BLENDEDCS303B-...CS4C1642483%"

    FORMAT B (everything on one line per subject):
      "1ANN and Machine LearningBLENDEDCS303B-...CS4C1642483%"

    Numbers at end: Presents, Special, Lectures, Pct% — all jammed together
    attended = Presents + Special,  conducted = Lectures

    KEY FIX: Subjects with same name but different component
    (e.g. "Design and Analysis of Al..." THEORY vs PRACTICAL)
    get " (Lab)" appended to PRACTICAL so they don't collide.
  */
  const results = [];
  if (!raw || !raw.trim()) return results;

  const lines = raw.split(/[\r\n]+/).map(l => l.trim()).filter(Boolean);
  const SKIP = /^(s\.?no\.?|course|component|variant|presents|special|lectures|attendance|%|course component|course variant|special attendance)$/i;
  const COMPONENT_RX = /^(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i;

  function getNameWithSuffix(nameStr, dataLine) {
    const compMatch = dataLine.match(/^(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
    const component = compMatch ? compMatch[1].toUpperCase() : '';
    let name = cleanName(nameStr.replace(/^\d+\s*/, '').trim().replace(/\.\.\.$/,'').trim());
    if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';
    return name;
  }

  // ── STRATEGY 1: Paired lines (CyberVidya Ctrl+A format) ─
  for (let i = 0; i < lines.length - 1; i++) {
    const nameLine = lines[i];
    const dataLine = lines[i + 1];

    if (!/%$/.test(dataLine)) continue;
    if (!COMPONENT_RX.test(dataLine)) continue;

    const nameStripped = nameLine.replace(/^\d+\s*/, '').trim().replace(/\.\.\.$/,'').trim();
    if (!nameStripped || nameStripped.length < 3) continue;
    if (SKIP.test(nameStripped) || COMPONENT_RX.test(nameStripped)) continue;
    if (!/[A-Za-z]{3,}/.test(nameStripped)) continue;

    const nums = parseKIETNumbers(dataLine);
    if (!nums) continue;

    const attended = Math.min(nums.presents + nums.special, nums.lectures);
    const name = getNameWithSuffix(nameStripped, dataLine);
    results.push({ name, attended, conducted: nums.lectures });
    i++;
  }

  // ── STRATEGY 2: Everything on ONE line per subject ───────
  // Format: "1ANN and Machine LearningBLENDEDCS303B-...1642483%"
  if (results.length === 0) {
    for (const line of lines) {
      if (!/%$/.test(line)) continue;
      const compMatch = line.match(/(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
      if (!compMatch) continue;

      const compIdx = line.search(/(THEORY|PRACTICAL|BLENDED|LAB|TUTORIAL)/i);
      let namePart = line.slice(0, compIdx).replace(/^\d+/, '').trim().replace(/\.\.\.$/,'').trim();
      if (!namePart || namePart.length < 3) continue;

      const component = compMatch[1].toUpperCase();
      const nums = parseKIETNumbers(line);
      if (!nums) continue;

      const attended = Math.min(nums.presents + nums.special, nums.lectures);
      let name = cleanName(namePart);
      if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';
      results.push({ name, attended, conducted: nums.lectures });
    }
  }

  // ── STRATEGY 3: Space-separated fallback ────────────────
  if (results.length === 0) {
    const flat = raw.replace(/[\r\n\t]+/g,' ').replace(/\s{2,}/g,' ');
    const rx = /(?:\d+\s+)?([A-Za-z][A-Za-z0-9&\-\s\.]{3,50}?)\s+(THEORY|PRACTICAL|BLENDED|LAB)\s+\S+\s+(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})\s+\d{1,3}%/gi;
    let m;
    while ((m = rx.exec(flat)) !== null) {
      const component = m[2].toUpperCase();
      let name = cleanName(m[1]);
      if (component === 'PRACTICAL' || component === 'LAB') name = name + ' (Lab)';
      const p = parseInt(m[3]), s = parseInt(m[4]), l = parseInt(m[5]);
      if (!name || l <= 0) continue;
      results.push({ name, attended: Math.min(p+s, l), conducted: l });
    }
  }

  // ── DEDUPLICATE: keep subject with most classes if exact name collision ──
  const nameMap = new Map();
  for (const s of results) {
    if (!s.name || s.name.length < 2) continue;
    const k = s.name.toLowerCase();
    if (!nameMap.has(k)) {
      nameMap.set(k, s);
    } else {
      // Keep the one with more conducted classes (more data = more reliable)
      if (s.conducted > nameMap.get(k).conducted) nameMap.set(k, s);
    }
  }
  return Array.from(nameMap.values());
}

// Extract P, S, L, Pct from jammed number string at end of CyberVidya data line
// e.g. "...CS4C1642483%" -> P=16, S=4, L=24, pct=83
function parseKIETNumbers(dataLine) {
  let lastLetterIdx = -1;
  for (let i = dataLine.length - 1; i >= 0; i--) {
    if (/[A-Za-z]/.test(dataLine[i])) { lastLetterIdx = i; break; }
  }
  if (lastLetterIdx === -1) return null;

  const tail = dataLine.slice(lastLetterIdx + 1).replace(/[^\d]/g, '');
  if (tail.length < 3) return null;

  const candidates = [];
  for (let p1 = 1; p1 <= 3; p1++) {
    for (let p2 = 0; p2 <= 2; p2++) {
      for (let p3 = 1; p3 <= 3; p3++) {
        const p4 = tail.length - p1 - p2 - p3;
        if (p4 < 1 || p4 > 3) continue;
        const P   = parseInt(tail.slice(0, p1));
        const S   = p2 > 0 ? parseInt(tail.slice(p1, p1 + p2)) : 0;
        const L   = parseInt(tail.slice(p1 + p2, p1 + p2 + p3));
        const Pct = parseInt(tail.slice(p1 + p2 + p3));
        if (Pct < 0 || Pct > 100) continue;
        if (L < 1 || L > 200)     continue;
        if (P < 0 || P > 200)     continue;
        if (S < 0 || S > 100)     continue;
        if (P + S > L + 1)        continue;
        const calc = (P + S) / L * 100;
        const diff = Math.abs(Math.round(calc) - Pct);
        if (diff <= 1) candidates.push({ presents: P, special: S, lectures: L, score: diff * 1000 + L });
      }
    }
  }
  if (!candidates.length) return null;
  candidates.sort((a, b) => a.score - b.score);
  return candidates[0];
}
// Expand common truncated KIET subject names back to full form
const KIET_NAME_MAP = {
  'design and analysis of al':   'Design and Analysis of Algorithms',
  'design and analysis of algo': 'Design and Analysis of Algorithms',
  'design and analysis of alg':  'Design and Analysis of Algorithms',
  'ann and machine':             'ANN and Machine Learning',
  'aws foun':                    'AWS Foundations & Data Analytics',
  'soft skills essential':       'Soft Skills Essential-2',
  'universal human':             'Universal Human Values',
  'web tech':                    'Web Technology',
  'data anal':                   'Data Analytics',
};
function expandName(raw) {
  const lower = (raw || '').toLowerCase().trim();
  for (const [prefix, full] of Object.entries(KIET_NAME_MAP)) {
    if (lower.startsWith(prefix)) return full;
  }
  return raw;
}

function cleanName(s) {
  const cleaned = (s || '')
    .replace(/\.\.\./g, '')
    .replace(/\.{2,}/g, '')
    .replace(/\s+/g, ' ')
    .replace(/[^\w\s\-&()\/]/g, '')
    .trim()
    .replace(/^[\d\s\.\-]+/, '')
    .trim()
    .slice(0, 80);
  return expandName(cleaned);
}

    if (!raw.trim()) { toast('Please paste data first!','error'); return; }
    const data = parseCyberVidyaData(raw);
    if (data.length === 0) {
      toast('Could not parse data 😅 Check the guide below!','error'); return;
    }
    setParsed(data);
    setSelected(new Set(data.map((_,i)=>i))); // select all by default
    setStep(2);
  }

  function toggleSel(i) {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(i) ? n.delete(i) : n.add(i);
      return n;
    });
  }

  async function handleImport() {
    if (!col) { toast('Firebase not connected!','error'); return; }
    if (selected.size === 0) { toast('No subjects selected!','error'); return; }
    setSaving(true);

    try {
      const toImport = parsed.filter((_,i) => selected.has(i));
      // Get existing subjects to avoid duplicates
      const existing = await col.get();
      const existingNames = existing.docs.map(d => d.data().name.toLowerCase().trim());

      let added = 0, updated = 0;
      for (const s of toImport) {
        const nameKey = s.name.toLowerCase().trim();
        const existDoc = existing.docs.find(d => d.data().name.toLowerCase().trim() === nameKey);
        if (existDoc) {
          await col.doc(existDoc.id).update({ conducted: s.conducted, attended: s.attended });
          updated++;
        } else {
          await col.add({ name: s.name, conducted: s.conducted, attended: s.attended,
            createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          added++;
        }
      }
      setSavedCount({ added, updated });
      setStep(3);
      if (onImported) onImported();

      toast('Import failed: ' + e.message, 'error');
    }
    setSaving(false);
  }

  const pct = s => s.conducted > 0 ? ((s.attended/s.conducted)*100).toFixed(1) : 0;

            </div>

            {/* ── STEP 1: PASTE ── */}
            {step===1 && <>
              <div className="modal-title">📋 Copy Data from CyberVidya</div>

              {/* HOW TO GUIDE */}
              <div style={{
                padding:'14px', marginBottom:'16px', borderRadius:'10px',
                background:'rgba(124,106,247,0.08)', border:'1px solid rgba(124,106,247,0.2)',
                fontSize:'13px', lineHeight:'1.7', color:'var(--text2)'
              }}>
                <div style={{fontWeight:700,color:'var(--accent2)',marginBottom:'6px'}}>📌 Follow these steps:</div>
                <div>1️⃣ Open <a href="https://kiet.cybervidya.net/attendance/my-attendance" target="_blank" style={{color:'var(--accent2)'}}>CyberVidya Attendance Page</a></div>
                <div>2️⃣ Select the full table using <strong style={{color:'var(--text)'}}>Ctrl+A → Ctrl+C</strong></div>
                <div>3️⃣ Paste in the box below using <strong style={{color:'var(--text)'}}>Ctrl+V</strong> → then click Parse</div>
                <div style={{marginTop:'6px',padding:'8px',background:'rgba(52,211,153,0.08)',borderRadius:'6px',fontSize:'11px',color:'var(--green)'}}>✅ Subjects with the same name (Theory + Lab) will be separated automatically!</div>
              </div>

              <div className="input-wrap" style={{marginBottom:'14px'}}>
                <label className="input-label">Paste Copied Data Here 👇</label>
                <textarea
                  value={raw}

                  placeholder={`Press Ctrl+A → Ctrl+C on CyberVidya and paste here!\n\nExample format:\n1ANN and Machine Learning\nBLENDEDCS303B-...CS4C1642483%\n\n7Design and Analysis of Al...\nTHEORYCS401L-...CS4C1752588%\n\n8Design and Analysis of Al...\nPRACTICALCS401P-...CS4C1642483%\n(Same-named subjects like Theory + Lab are auto-split!)`}
                  style={{
                    width:'100%', minHeight:'160px', padding:'12px 14px',
                    background:'var(--surface)', border:'1.5px solid var(--border)',

                    fontFamily:'monospace', fontSize:'12px', resize:'vertical',
                    outline:'none', lineHeight:'1.6'

              <div style={{display:'flex',gap:'10px'}}>

                <button className="btn btn-primary" style={{flex:2}} onClick={handleParse}>

            </>}

            {/* ── STEP 2: PREVIEW ── */}
            {step===2 && <>
              <div className="modal-title">✅ {parsed.length} Subjects Found — Select to Import</div>

              <div style={{
                padding:'10px 14px', marginBottom:'14px', borderRadius:'8px',
                background:'rgba(52,211,153,0.08)', border:'1px solid rgba(52,211,153,0.2)',
                fontSize:'13px', color:'var(--green)'

                🎉 {parsed.length} subjects found! Select the ones you want to import.

              {/* SELECT ALL / NONE */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
                <span style={{fontSize:'12px',color:'var(--text2)'}}>{selected.size} / {parsed.length} selected</span>
                <div style={{display:'flex',gap:'8px'}}>
                  <button onClick={()=>setSelected(new Set(parsed.map((_,i)=>i)))}
                    style={{background:'none',border:'none',color:'var(--accent2)',fontSize:'12px',cursor:'pointer',fontWeight:600}}>
                    Select All
                  </button>
                  <button onClick={()=>setSelected(new Set())}
                    style={{background:'none',border:'none',color:'var(--text3)',fontSize:'12px',cursor:'pointer',fontWeight:600}}>
                    Clear

                </div>

              {/* SUBJECT CARDS */}
              <div style={{display:'flex',flexDirection:'column',gap:'8px',maxHeight:'280px',overflowY:'auto',marginBottom:'16px',paddingRight:'4px'}}>
                {parsed.map((s,i)=>{
                  const p = pct(s);

                  const isSel = selected.has(i);
                  return (
                    <div key={i}
                      onClick={()=>toggleSel(i)}
                      style={{

                      {/* CHECKBOX */}
                      <div style={{

                        background: isSel ? 'var(--accent)' : 'var(--surface2)',

                        fontSize:'11px', color:'white', transition:'all .15s'

                      </div>

                      <div style={{flex:1, minWidth:0}}>

                      </div>
                      {/* PCT */}
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontFamily:'Syne,sans-serif',fontSize:'16px',fontWeight:800,color:col2}}>{p}%</div>

                          background: statusOf(s)==='safe'?'var(--green-bg)':statusOf(s)==='risk'?'var(--yellow-bg)':'var(--red-bg)',
                          color: col2
                        }}>
                          {statusOf(s)==='safe'?'SAFE':statusOf(s)==='risk'?'RISK':'LOW'}

              <div style={{display:'flex',gap:'10px'}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setStep(1)}>← Back</button>
                <button className="btn btn-primary" style={{flex:2}} onClick={handleImport} disabled={saving||selected.size===0}>
                  {saving
                    ? <><span style={{animation:'spin .7s linear infinite',display:'inline-block'}}>⏳</span> Saving...</>
                    : `☁️ Import ${selected.size} Subject${selected.size!==1?'s':''}`}
                </button>
              </div>
            </>}

            {/* ── STEP 3: SUCCESS ── */}
            {step===3 && <>
              <div style={{textAlign:'center',padding:'20px 0 10px'}}>
                <div style={{fontSize:'56px',marginBottom:'14px'}}>🎉</div>
                <div style={{fontFamily:'Syne,sans-serif',fontSize:'22px',fontWeight:800,color:'var(--green)',marginBottom:'8px'}}>

                </div>
                <div style={{fontSize:'14px',color:'var(--text2)',lineHeight:'1.7'}}>
