//  parseCyberVidyaAPIData  —  handles JSON from extension API
// ══════════════════════════════════════════════════════════════
function parseCyberVidyaAPIData(apiData) {
  const results = [];
  try {
    const arr = Array.isArray(apiData) ? apiData
      : apiData.data       ? (Array.isArray(apiData.data)       ? apiData.data       : [apiData.data])
      : apiData.attendance ? apiData.attendance
      : apiData.result     ? apiData.result : [];
    for (const item of arr) {
      const rawName  = (item.courseName||item.course_name||item.subject||item.subjectName||item.name||'').trim();
      const name     = expandName(rawName.replace(/\.{2,}$/, '').trim());
      const presents = parseInt(item.presents||item.attended||item.present||0);
      const special  = parseInt(item.specialAttendance||item.special||0);
      const lectures = parseInt(item.lectures||item.totalLectures||item.conducted||0);
      if (name && lectures > 0)
        results.push({ name: name.slice(0,80), attended: Math.min(presents+special,lectures), conducted: lectures });
    }
  } catch(e) { console.warn('[BunkPlanner] API parse error:', e); }
  return results;
}

// ══════════════════════════════════════════════════════════════
//  SyncBanner  —  shown when extension pushes data to the app
//  Full-featured: select subjects, deduplicate, save to Firebase
// ══════════════════════════════════════════════════════════════
function SyncBanner({ subjects, user, onDone, onCancel }) {
  const [selected, setSelected] = useState(() => new Set(subjects.map((_,i) => i)));
  const [saving,   setSaving]   = useState(false);
  const [done,     setDone]     = useState(false);
  const [counts,   setCounts]   = useState(null);
  const [filter,   setFilter]   = useState('all'); // 'all' | 'safe' | 'risk' | 'danger'

  const TARGET = 75;

  const col = (firebaseReady && user)
    ? db.collection('users').doc(user.uid).collection('subjects')
    : null;

  /* helpers */
  const pctOf  = s => calcAtt(s.conducted, s.attended);
  const statOf = s => getStatus(pctOf(s), TARGET);

  function toggleSel(i) {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(i) ? n.delete(i) : n.add(i);
      return n;
    });
  }
  function selAll()  { setSelected(new Set(subjects.map((_,i) => i))); }
  function selNone() { setSelected(new Set()); }
  function selByStatus(st) {
    setSelected(new Set(subjects.map((_,i) => i).filter(i => statOf(subjects[i]) === st)));
  }

  /* Firebase save with dedup */
  async function handleImport() {
    if (!col)             { toast('Firebase not connected!', 'error'); return; }
    if (selected.size===0){ toast('Koi subject select nahi kiya!', 'error'); return; }
    setSaving(true);
    try {
      const toImport = subjects.filter((_,i) => selected.has(i));

      // Fetch existing subjects to dedup
      const snapshot = await col.get();
      const existingDocs = snapshot.docs;

      let added = 0, updated = 0;
      for (const s of toImport) {
        const nameKey = s.name.toLowerCase().trim();
        const match   = existingDocs.find(d => d.data().name.toLowerCase().trim() === nameKey);
        if (match) {
          // Update existing
          await col.doc(match.id).update({
            attended:    s.attended,
            conducted:   s.conducted,
            lastSynced:  firebase.firestore.FieldValue.serverTimestamp()
          });
          updated++;
        } else {
          // Add new
          await col.add({
            name:       s.name,
            attended:   s.attended,
            conducted:  s.conducted,
            createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
            lastSynced: firebase.firestore.FieldValue.serverTimestamp(),
            source:     'cybervidya-extension'
          });
          added++;
        }
      }

      setCounts({ added, updated });
      setDone(true);
      toast(`✅ ${added} added, ${updated} updated from CyberVidya!`, 'success');
      setTimeout(onDone, 3000);
    } catch(e) {
      console.error('[BunkPlanner] SyncBanner import error:', e);
      toast('Import failed: ' + e.message, 'error');
    }
    setSaving(false);
  }

  /* filtered view */
  const filtered = filter === 'all'
    ? subjects.map((_,i) => i)
    : subjects.map((_,i) => i).filter(i => statOf(subjects[i]) === filter);

  /* aggregate stats */
  const safeCount   = subjects.filter(s => statOf(s) === 'safe').length;
  const riskCount   = subjects.filter(s => statOf(s) === 'risk').length;
  const dangerCount = subjects.filter(s => statOf(s) === 'danger').length;

  return (
    <div className="ext-sync-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="ext-sync-card">

        {!done ? (
          <>
            {/* ── Header ── */}
            <div className="ext-sync-header">
              <div className="ext-sync-icon">🎓</div>
              <div>
                <div className="ext-sync-title">CyberVidya Sync!</div>
                <div className="ext-sync-sub">
                  {subjects.length} subjects fetched — select and import
                </div>
              </div>
              <button onClick={onCancel} style={{
                marginLeft:'auto', background:'none', border:'none',
                cursor:'pointer', fontSize:'20px', color:'var(--text2)', lineHeight:1, flexShrink:0
              }}>✕</button>
            </div>

            {/* ── Summary pills ── */}
            <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
              {[
                {label:`All (${subjects.length})`,  val:'all',    color:'var(--accent2)'},
                {label:`✅ Safe (${safeCount})`,    val:'safe',   color:'var(--green)'},
                {label:`⚠️ Risk (${riskCount})`,    val:'risk',   color:'var(--yellow)'},
                {label:`🚨 Low (${dangerCount})`,   val:'danger', color:'var(--red)'},
              ].map(p => (
                <button key={p.val} onClick={() => setFilter(p.val)} style={{
                  padding:'4px 11px', borderRadius:'100px', border:'none', cursor:'pointer',
                  fontSize:'11px', fontWeight:700, transition:'all .15s',
                  background: filter===p.val ? p.color : 'var(--surface2)',
                  color:       filter===p.val ? (p.val==='all'?'#fff':'#000') : 'var(--text2)',
                  opacity:     filter===p.val ? 1 : 0.7
                }}>{p.label}</button>
              ))}
            </div>

            {/* ── Select controls ── */}
            <div className="ext-sync-controls">
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:'11px'}} onClick={selAll}>Select All</button>
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:'11px'}} onClick={selNone}>Clear</button>
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:'11px'}} onClick={() => selByStatus('danger')}>Select Danger</button>
              <span className="ext-sync-count">{selected.size}/{subjects.length} selected</span>
            </div>

            {/* ── Subject rows ── */}
            <div className="ext-subj-list">
              {filtered.length === 0 && (
                <div style={{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'13px'}}>
                  No subjects in this category
                </div>
              )}
              {filtered.map(i => {
                const s   = subjects[i];
                const pct = pctOf(s);
                const st  = statOf(s);
                const col2 = sColor(st);
                const sel  = selected.has(i);
                return (
                  <div
                    key={i}
                    className={`ext-subj-row ${sel ? 'sel' : 'unsel'}`}
                    onClick={() => toggleSel(i)}
                  >
                    <div className={`ext-checkbox ${sel ? 'on' : 'off'}`}>{sel ? '✓' : ''}</div>
                    <div className="ext-subj-info">
                      <div className="ext-subj-name">{s.name}</div>
                      <div className="ext-subj-meta">{s.attended} attended / {s.conducted} total</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',flexShrink:0}}>
                      <div className="ext-subj-pct" style={{color:col2}}>{pct.toFixed(1)}%</div>
                      <span className="ext-subj-badge" style={{
                        background: st==='safe'?'var(--green-bg)':st==='risk'?'var(--yellow-bg)':'var(--red-bg)',
                        color: col2, border:`1px solid ${col2}33`
                      }}>{st.toUpperCase()}</span>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* ── Action buttons ── */}
            <div className="ext-footer-btns">
              <button className="btn btn-ghost" style={{flex:1}} onClick={onCancel}>Cancel</button>
              <button
                className="btn btn-primary"
                style={{flex:2}}
                onClick={handleImport}
                disabled={saving || selected.size === 0}
              >
                {saving
                  ? <><span style={{display:'inline-block',animation:'spin .7s linear infinite'}}>⏳</span> Saving...</>
                  : `☁️ Import ${selected.size} Subject${selected.size !== 1 ? 's' : ''} to Firebase`}
              </button>
            </div>
          </>
        ) : (
          /* ── Done state ── */
          <div className="ext-done-wrap">
            <div className="ext-done-icon">🎉</div>
            <div className="ext-done-title">Sync Complete!</div>
            <div className="ext-done-sub">
              {counts?.added   > 0 && <div>✅ <strong>{counts.added}</strong> new subject{counts.added!==1?'s':''} added</div>}
              {counts?.updated > 0 && <div>🔄 <strong>{counts.updated}</strong> subject{counts.updated!==1?'s':''} updated</div>}
              <div style={{marginTop:8,color:'var(--text3)',fontSize:'12px'}}>
                Data synced to Firebase ☁️ — visible on all devices!
              </div>
            </div>
            <button className="btn btn-primary" style={{marginTop:20,width:'100%'}} onClick={onDone}>
              ✅ Done!
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════════════
//  CyberVidyaScraper — Popup-based, NO extension needed
//  Works on mobile + desktop. Injects scraper into popup window.
// ══════════════════════════════════════════════════════════════

const SCRAPER_SCRIPT = `
(function() {
  'use strict';
  var PARENT = window.opener;
  if (!PARENT) return;

  function post(type, payload) {
    try { PARENT.postMessage({ _bpp: true, type: type, payload: payload }, '*'); } catch(e) {}
  }
  function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

  // Expand truncated KIET names
  function expandKiet(n) {
    var l = (n || '').toLowerCase().trim();
    if (l.startsWith('design and analysis of al')) return 'Design and Analysis of Algorithms';
    if (l.startsWith('ann and machine'))           return 'ANN and Machine Learning';
    if (l.startsWith('aws foun'))                  return 'AWS Foundations & Data Analytics';
    if (l.startsWith('soft skills'))               return 'Soft Skills Essential-2';
    if (l.startsWith('universal human'))           return 'Universal Human Values';
    if (l.startsWith('web tech'))                  return 'Web Technology';
    if (l.startsWith('data anal'))                 return 'Data Analytics';
    if (l.startsWith('computer networks l'))       return 'Computer Networks Lab';
    return n;
  }

  function parseTable() {
    var results = [];
    var seen    = {};
    var tables  = document.querySelectorAll('table');

    for (var ti = 0; ti < tables.length; ti++) {
      var table = tables[ti];
      var rows  = Array.from(table.querySelectorAll('tr'));
      if (rows.length < 3) continue;

      var hdr = null, hdrIdx = -1;
      for (var i = 0; i < Math.min(rows.length, 5); i++) {
        var cells = Array.from(rows[i].querySelectorAll('th,td'))
                        .map(function(c){ return c.innerText.trim().toLowerCase(); });
        if (cells.some(function(c){ return c === 'course'; }) &&
            (cells.some(function(c){ return c === 'presents' || c === 'present'; }) ||
             cells.some(function(c){ return c === 'lectures'; }))) {
          hdr = cells; hdrIdx = i; break;
        }
      }
      if (!hdr || hdrIdx < 0) continue;

      var cCourse=-1, cComp=-1, cPresents=-1, cSpecial=-1, cLectures=-1;
      hdr.forEach(function(h, i) {
        if (h === 'course')                                     cCourse   = i;
        else if (h === 'course component' || h === 'component') cComp     = i;
        else if (h === 'presents' || h === 'present')           cPresents = i;
        else if (h.indexOf('special') >= 0)                     cSpecial  = i;
        else if (h === 'lectures')                              cLectures = i;
      });
      if (cCourse < 0 || cLectures < 0) continue;

      for (var i = hdrIdx + 1; i < rows.length; i++) {
        var tds   = Array.from(rows[i].querySelectorAll('td'));
        if (tds.length <= Math.max(cCourse, cLectures)) continue;
        var texts = tds.map(function(t){ return t.innerText.trim(); });
        if (!/^\d+$/.test(texts[0])) continue;

        var rawName = texts[cCourse] || '';
        if (!rawName || rawName.length < 3) continue;
        if (/^(BLENDED|THEORY|PRACTICAL|LAB|TUTORIAL)$/i.test(rawName)) continue;
        if (/^\d+$/.test(rawName)) continue;

        // Clean trailing dots
        var name = rawName.replace(/\.+$/, '').trim().slice(0, 80);
        if (name.length < 2) continue;

        var comp   = (cComp >= 0 && cComp < texts.length) ? texts[cComp].toUpperCase() : '';
        var suffix = (comp === 'PRACTICAL' || comp === 'LAB') ? ' (Lab)' : '';
        var full   = expandKiet(name) + suffix;
        var key    = full.toLowerCase();
        if (seen[key]) continue;

        var P = cPresents >= 0 ? (parseInt(texts[cPresents]) || 0) : 0;
        var S = cSpecial  >= 0 ? (parseInt(texts[cSpecial])  || 0) : 0;
        var L = parseInt(texts[cLectures]) || 0;
        if (L <= 0) continue;

        seen[key] = true;
        results.push({ name: full, attended: Math.min(P + S, L), conducted: L });
      }
      if (results.length > 0) break;
    }
    return results;
  }

  async function run() {
    post('status', { step: 'checking' });
    var found = false;
    for (var i = 0; i < 30; i++) {
      var tables = document.querySelectorAll('table');
      for (var j = 0; j < tables.length; j++) {
        if (tables[j].querySelectorAll('tbody tr').length > 0 &&
            (tables[j].innerText || '').indexOf('%') >= 0) {
          found = true; break;
        }
      }
      if (found) break;
      await sleep(500);
    }
    if (!found) {
      if (!window.location.href.includes('my-attendance')) {
        post('status', { step: 'navigating' });
        window.location.href = 'https://kiet.cybervidya.net/attendance/my-attendance';
        return;
      }
      post('error', { msg: 'Table not found. Please make sure you are logged in to CyberVidya.' });
      return;
    }
    post('status', { step: 'scraping' });
    await sleep(300);
    var subjects = parseTable();
    if (subjects.length === 0) {
      post('error', { msg: 'Could not read attendance. Please login to CyberVidya and retry.' });
      return;
    }
    post('done', { subjects: subjects });
  }

  var lastUrl = location.href;
  var observer = new MutationObserver(function() {
    if (location.href !== lastUrl) { lastUrl = location.href; setTimeout(run, 1200); }
  });
  observer.observe(document.body || document.documentElement, { childList: true, subtree: true });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(run, 800); });
  } else {
    setTimeout(run, 800);
  }
})();
`;

function AutoFetchBanner({ extInstalled: extProp, onDataReceived }) {
  const [phase,     setPhaseRaw] = useState('idle');
  const [statusMsg, setStatusMsg] = useState('');
  const [progress,  setProgress]  = useState(0);
  const phaseRef  = React.useRef('idle');
  const popupRef  = React.useRef(null);
  const timerRef  = React.useRef(null);

  function setPhase(p) { phaseRef.current = p; setPhaseRaw(p); }

  function injectScraper(popup) {
    try {
      const doc = popup.document;
      if (!doc) return false;
      if (doc.getElementById('_bpp_scraper')) return true;
      const s = doc.createElement('script');
      s.id = '_bpp_scraper';
      s.textContent = SCRAPER_SCRIPT;
      (doc.head || doc.body || doc.documentElement).appendChild(s);
      return true;
    } catch(e) { return false; }
  }

  function handleFetch() {
    if (phaseRef.current !== 'idle') return;
    setPhase('opening');
    setStatusMsg('Opening CyberVidya...');
    setProgress(10);

    const W = Math.min(960, window.screen.width  - 40);
    const H = Math.min(700, window.screen.height - 60);
    const L = Math.round((window.screen.width  - W) / 2);
    const T = Math.round((window.screen.height - H) / 2);

    const popup = window.open(
      'https://kiet.cybervidya.net/attendance/my-attendance',
      'bpp_cv_popup',
      `width=${W},height=${H},left=${L},top=${T},resizable=yes,scrollbars=yes`
    );

    if (!popup) {
      setPhase('error');
      setStatusMsg('Popup blocked! Please allow popups for this site and retry.');
      return;
    }
    popupRef.current = popup;

    // Inject scraper as soon as popup document is accessible
    let tries = 0;
    const injectIv = setInterval(() => {
      tries++;
      if (popup.closed) { clearInterval(injectIv); return; }
      if (injectScraper(popup)) clearInterval(injectIv);
      if (tries > 50) clearInterval(injectIv);
    }, 400);

    // Overall timeout 3 minutes
    timerRef.current = setTimeout(() => {
      if (phaseRef.current !== 'idle' && phaseRef.current !== 'done') {
        setPhase('error');
        setStatusMsg('Timeout. Please login to CyberVidya and retry.');
        if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
      }
    }, 180000);
  }

  // Listen for postMessage from popup
  useEffect(() => {
    function onMsg(e) {
      const data = e.data;
      if (!data || !data._bpp) return;

      if (data.type === 'status') {
        const step = data.payload && data.payload.step;
        if (step === 'navigating') { setStatusMsg('Navigating to attendance page...'); setProgress(25); }
        if (step === 'checking')   { setStatusMsg('Waiting for attendance table...'); setPhase('waiting'); setProgress(45); }
        if (step === 'scraping')   { setStatusMsg('Reading your attendance data...'); setPhase('scraping'); setProgress(75); }
      }

      if (data.type === 'done') {
        clearTimeout(timerRef.current);
        const subs = ((data.payload && data.payload.subjects) || []).filter(function(s){ return s.name && s.conducted > 0; });
        if (subs.length > 0) {
          setProgress(100);
          setPhase('done');
          setStatusMsg(subs.length + ' subjects fetched successfully!');
          setTimeout(() => {
            if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
          }, 700);
          setTimeout(() => {
            setPhase('idle'); setStatusMsg(''); setProgress(0);
            onDataReceived(subs);
          }, 1100);
        } else {
          setPhase('error');
          setStatusMsg('No subjects found. Please make sure you are logged in.');
        }
      }

      if (data.type === 'error') {
        clearTimeout(timerRef.current);
        setPhase('error');
        setStatusMsg((data.payload && data.payload.msg) || 'Something went wrong. Please retry.');
        setProgress(0);
      }
    }
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [onDataReceived]);

  // Detect popup closed manually
  useEffect(() => {
    if (!['opening','waiting','scraping'].includes(phase)) return;
    const iv = setInterval(() => {
      if (popupRef.current && popupRef.current.closed) {
        clearInterval(iv);
        if (phaseRef.current !== 'done' && phaseRef.current !== 'idle') {
          setPhase('idle'); setStatusMsg(''); setProgress(0);
        }
      }
    }, 800);
    return () => clearInterval(iv);
  }, [phase]);

  useEffect(() => {
    return () => {
      clearTimeout(timerRef.current);
      if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
    };
  }, []);

  const isLoading = ['opening','waiting','scraping'].includes(phase);

  const steps = [
    {n:'1', l:'Click Fetch'},
    {n:'2', l:'Login on CyberVidya'},
    {n:'3', l:'Auto Scrape'},
    {n:'4', l:'Import'},
  ];

  return (
    <div className="cv-fetch-banner">
      <div className="cv-banner-inner">
        <div className="cv-banner-icon" style={{fontSize: isLoading ? '26px' : '30px'}}>
          {phase==='error'?'❌': phase==='done'?'✅': isLoading?'⏳':'🎓'}
        </div>
        <div className="cv-banner-text">
          <div className="cv-banner-title">
            {phase==='error' ? 'Something went wrong' :
             phase==='done'  ? 'Attendance fetched! 🎉' :
             'Fetch Attendance from CyberVidya'}
          </div>
          <div className="cv-banner-sub">
            {statusMsg || 'Works on mobile & desktop — no extension needed!'}
          </div>
          {!isLoading && phase === 'idle' && (
            <div className="cv-banner-steps">
              {steps.map(({n,l}, i, a) => (
                <React.Fragment key={n}>
                  <div className="cv-step"><span>{n}</span> {l}</div>
                  {i < a.length-1 && <span className="cv-step-arrow">→</span>}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>

        {phase === 'idle' && (
          <button className="cv-fetch-btn" onClick={handleFetch}>
            <span className="cv-fetch-btn-shine"/>
            <span style={{fontSize:'16px'}}>⚡</span>
            Fetch Attendance
          </button>
        )}
        {isLoading && (
          <div className="cv-fetching-state">
            <span className="cv-dot"/><span className="cv-dot"/><span className="cv-dot"/>
          </div>
        )}
        {phase === 'error' && (
          <button className="btn btn-ghost" style={{padding:'8px 16px',fontSize:'13px',flexShrink:0}}
            onClick={() => { setPhase('idle'); setStatusMsg(''); setProgress(0); }}>
            🔄 Retry
          </button>
        )}
      </div>

      {isLoading && (
        <div className="popscrape-progress" style={{marginTop:'14px',marginBottom:0}}>
          <div className="popscrape-progress-fill" style={{width:`${progress}%`}}/>
        </div>
      )}

      {phase === 'idle' && (
        <div style={{marginTop:'9px',fontSize:'11px',color:'var(--text3)',lineHeight:1.5}}>
          💡 A small popup window will open — allow popups if prompted. Works on phone &amp; desktop.
        </div>
      )}
    </div>
  );
}

        )}

    </div>
  );

function App() {
  const [user,setUser]           = useState(undefined);
  const [dark,setDark]           = useState(true);
  const [tab,setTab]             = useState('subjects');
  const [syncBanner, setSyncBanner] = useState(null);
  const [extInstalled, setExtInstalled] = useState(false);
  const [profileOpen,  setProfileOpen]  = useState(false);
  const [profileData,  setProfileData]  = useState(() => {
    try { return JSON.parse(localStorage.getItem('bpp_profile') || '{}'); } catch(e) { return {}; }
  });

  // Close profile dropdown on outside click
  useEffect(()=>{
    if (!profileOpen) return;
    function onClickOutside(e) {
      if (!e.target.closest('.nav-avatar-btn') && !e.target.closest('.profile-dropdown')) {
        setProfileOpen(false);
      }
    }
    document.addEventListener('mousedown', onClickOutside);
    return () => document.removeEventListener('mousedown', onClickOutside);
  }, [profileOpen]);

  useEffect(()=>{
    const saved = localStorage.getItem('bpp_theme');
    if(saved) setDark(saved==='dark');
    if(firebaseReady) {
      const unsub = auth.onAuthStateChanged(u => setUser(u||null));
      return ()=>unsub();
    } else { setUser(null); }
  },[]);

  // Extension detection — checks both possible marker IDs, polls robustly
  useEffect(()=>{
    function isExtInstalled() {
      return !!(
        document.getElementById('bunkplanner-extension-installed') ||
        document.getElementById('bpp-ext-marker')
      );
    }
    if (isExtInstalled()) { setExtInstalled(true); return; }
    // Poll every 400ms for up to 20s (bridge may load after React)
    let count = 0;
    const iv = setInterval(() => {
      count++;
      if (isExtInstalled()) { setExtInstalled(true); clearInterval(iv); return; }
      if (count >= 50) clearInterval(iv); // stop after 20s
    }, 400);
    return () => clearInterval(iv);
  },[]);

  // Process sync payload (called from event OR localStorage)
  function processSyncPayload(detail) {
    console.log('[BunkPlanner] processSyncPayload — type:', detail.type,
      'subjects:', detail.subjects?.length ?? 'N/A');

    let subjects = [];

    // Normalize subjects array from any source
    function extractSubjects(arr) {
      if (!Array.isArray(arr) || arr.length === 0) return [];
      return arr.map(s => ({
        name:      (s.name || '').trim().slice(0, 80),
        attended:  parseInt(s.attended)  || 0,
        conducted: parseInt(s.conducted) || 0,
      })).filter(s => s.name && s.conducted > 0);
    }

    const t = (detail.type || '').toLowerCase();

    // type:'direct' or type:'scraped_v8' — subjects array provided directly
    if ((t === 'direct' || t === 'scraped_v8' || t === 'scraped_v9') && Array.isArray(detail.subjects)) {
      subjects = extractSubjects(detail.subjects);
    }
    // Fallback: subjects array present regardless of type
    else if (Array.isArray(detail.subjects) && detail.subjects.length > 0) {
      subjects = extractSubjects(detail.subjects);
    }
    // API JSON format
    else if (t === 'api' && detail.data) {
      subjects = parseCyberVidyaAPIData(detail.data);
    }
    // Raw scraped text (copy-paste format)
    else if ((t === 'scraped' || t === 'raw') && detail.data) {
      subjects = parseCyberVidyaData(detail.data);
    }

    if (subjects.length > 0) {
      console.log('[BunkPlanner] ✅ Showing SyncBanner for', subjects.length, 'subjects');
      setSyncBanner({ subjects });
      setTab('subjects');
      toast(`🎓 ${subjects.length} subjects fetched from CyberVidya!`, 'success');
    } else {
      console.warn('[BunkPlanner] processSyncPayload: no valid subjects parsed', detail);
      toast('Could not parse CyberVidya data 😅', 'error');
    }
  }

  // Guard: prevent double-processing same sync
  const syncProcessed = React.useRef(false);

  function safeProcessSync(parsed) {
    if (syncProcessed.current) { console.log('[BunkPlanner] Sync already processed, skipping'); return; }
    syncProcessed.current = true;
    processSyncPayload(parsed);
    // Reset after 10s to allow future syncs
    setTimeout(() => { syncProcessed.current = false; }, 10000);
  }

  // On mount: check localStorage for pending sync data (set by bridge/extension)
  useEffect(()=>{
    const pending = localStorage.getItem('bp_pending_sync');
    if (pending) {
      localStorage.removeItem('bp_pending_sync');
      try {
        const parsed = JSON.parse(pending);
        console.log('[BunkPlanner] Found pending sync in localStorage:', parsed.type, parsed.subjects?.length);
        setTimeout(() => safeProcessSync(parsed), 600);
      } catch(e) { console.error('[BunkPlanner] localStorage parse error:', e); }
    }
  // eslint-disable-next-line
  }, []);

  // Listen for CustomEvent (fired by bridge content script or direct injection)
  useEffect(()=>{
    function handleSync(e) {
      const detail = e.detail || {};
      console.log('[BunkPlanner] CustomEvent received:', detail.type, detail.subjects?.length);
      localStorage.removeItem('bp_pending_sync');
      safeProcessSync(detail);
    }
    window.addEventListener('bunkplanner-sync', handleSync);
    return ()=>window.removeEventListener('bunkplanner-sync', handleSync);
  // eslint-disable-next-line
  },[]);

  // POLLING FALLBACK: Check localStorage every 800ms for 12s after page load
  // This catches cases where the bridge writes AFTER React's mount useEffect
  useEffect(()=>{
    let attempts = 0;
    const maxAttempts = 15;
    const interval = setInterval(() => {
      attempts++;
      const pending = localStorage.getItem('bp_pending_sync');
      if (pending) {
        clearInterval(interval);
        localStorage.removeItem('bp_pending_sync');
        try {
          const parsed = JSON.parse(pending);
          console.log('[BunkPlanner] Polling found sync data:', parsed.type, parsed.subjects?.length);
          safeProcessSync(parsed);
        } catch(e) { console.error('[BunkPlanner] Polling parse error:', e); }
      }
      if (attempts >= maxAttempts) clearInterval(interval);
    }, 800);
    return () => clearInterval(interval);
  // eslint-disable-next-line
  },[]);

  useEffect(()=>{
    document.body.className = dark ? '' : 'light';
    localStorage.setItem('bpp_theme', dark?'dark':'light');
  },[dark]);

  async function logout() {
    await auth.signOut();
    setUser(null);
    toast('Logged out! See you 👋','info');
  }



  if(user===undefined) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:'20px'}}>
      <div style={{fontSize:'52px',animation:'float 2s ease infinite'}}>🎓</div>
      <div style={{fontFamily:'Syne,sans-serif',fontSize:'22px',fontWeight:800,color:'var(--accent2)'}}>BunkPlanner Pro</div>
      <div style={{display:'flex',gap:'8px'}}>
        {[0,1,2].map(i=>(
          <div key={i} className="skeleton" style={{width:'9px',height:'9px',borderRadius:'50%',animation:`pulse 1.2s ease ${i*.2}s infinite`}}/>
        ))}
      </div>
    </div>
  );

  if(!user) return <><AuthScreen onAuth={setUser}/><ToastContainer/></>;

  const displayName = user.displayName || (user.email&&user.email.split('@')[0]) || 'Student';
  const initials    = displayName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo">Bunk<span>Planner</span> Pro</div>
        <div className="nav-right">
          <button className="theme-toggle" onClick={()=>setDark(p=>!p)}>{dark?'☀️':'🌙'}</button>
          <div style={{position:'relative'}}>
            <button
              className={`nav-avatar-btn ${profileOpen?'open':''}`}
              onClick={()=>setProfileOpen(p=>!p)}
            >
              <div className="nav-avatar" style={{background:`linear-gradient(135deg,${profileData.avatarColor||'var(--accent)'},var(--accent2))`}}>
                {profileData.avatarEmoji || initials}
              </div>
              <span className="nav-username">{profileData.displayName || displayName}</span>
              <span className="nav-chevron">▾</span>
            </button>
            {profileOpen && (
              <ProfileDropdown
                user={user}
                displayName={displayName}
                initials={initials}
                profileData={profileData}
                setProfileData={setProfileData}
                onClose={()=>setProfileOpen(false)}
                onLogout={()=>{setProfileOpen(false);logout();}}
              />
            )}
          </div>
        </div>
      </nav>
      {syncBanner && (
        <SyncBanner
          subjects={syncBanner.subjects}
          user={user}
          onDone={()=>setSyncBanner(null)}
          onCancel={()=>setSyncBanner(null)}
        />
      )}
      <main className="main">
        <div className="hero">
          <div className="hero-badge">
            <span>👋</span> Welcome back, {profileData.displayName || displayName}!
          </div>
          <h1 className="hero-title">Bunk Smarter,<br/>Not Harder</h1>
          <p className="hero-sub">Data syncs real-time across all devices.<br/>Add on laptop, view on phone! ☁️</p>
          {(profileData.college || profileData.branch || profileData.year) && (
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',marginTop:'16px',flexWrap:'wrap'}}>
              {profileData.college && (
                <div style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'var(--text3)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'100px',padding:'4px 12px'}}>
                  🏫 <span style={{color:'var(--text2)',fontWeight:600}}>{profileData.college}</span>
                </div>
              )}
              {profileData.branch && (
                <div style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'var(--text3)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'100px',padding:'4px 12px'}}>
                  🎓 <span style={{color:'var(--text2)',fontWeight:600}}>{profileData.branch}{profileData.year ? ` · ${profileData.year} Year` : ''}</span>
                </div>
              )}
              {profileData.rollNo && (
                <div style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'var(--text3)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'100px',padding:'4px 12px'}}>
                  🪪 <span style={{color:'var(--text2)',fontWeight:600}}>{profileData.rollNo}</span>
                </div>
              )}
            </div>
          )}
        </div>
        <AutoFetchBanner
          onDataReceived={(subs)=>{ setSyncBanner({subjects:subs}); setTab('subjects'); }}
        />
        <div className="tabs">
          <button className={`tab-btn ${tab==='subjects'?'active':''}`} onClick={()=>setTab('subjects')}>📚 My Subjects</button>
          <button className={`tab-btn ${tab==='calc'?'active':''}`} onClick={()=>setTab('calc')}>🧮 Calculator</button>
        </div>
        {tab==='subjects' && <Subjects user={user}/>}
        {tab==='calc'     && <Calculator/>}
      </main>
      <footer className="footer">Built with <span>❤️</span> for KIET students — bunk planning is a life skill 😎</footer>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
